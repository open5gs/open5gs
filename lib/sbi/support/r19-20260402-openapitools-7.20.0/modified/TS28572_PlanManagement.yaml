  /plan-activation-jobs:
    post:
      tags:
        - Activation Management
      summary: Create a new plan activation job  
      description: Creates and starts a new plan activation job based on an existing plan descriptor (or plan group descriptor or fallback descriptor).  The new job's ID will be generated by the server and returned in the Location header.
      operationId: createActivationJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivationJobWritableProperties'
      responses:
        '201':
          description: Plan activation job created successfully.
                       The response body provides job details, and the Location header points to the new job.
          headers:
            Location:
              description: URI of the created job resource.
              schema:
                type: string
                format: uri-reference  
                example: "/plan-activation-jobs/myjob-111"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationJob'
        '400':  
          description: Invalid request payload or parameters (e.g., malformed JSON, missing required fields).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

    get:
      tags:
        - Activation Management
      summary: Get plan activation jobs
      description: Retrieve a list of plan activation jobs. 
      operationId: getActivationJobs
      parameters:
        - in: query
          name: job-state
          schema:
            $ref: '#/components/schemas/JobState'
          description: Filter jobs by their current state.
          example: "RUNNING"
      responses:
        '200':
          description: List of plan activation jobs retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobListEntry' 
        '400':  
          description: Invalid query parameters
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /plan-activation-jobs/{id}:  
    parameters:  
      - in: path
        name: id
        schema:
          type: string
          description: Unique identifier of the plan activation job.
          example: "Dublin-plan-activation-001"
        required: true 
    get:
      tags:
        - Activation Management
      summary: Get plan activation job details by ID
      description: Retrieve detailed information about a specific plan activation job using its unique identifier.
      operationId: getActivationJobById
      responses:
        '200':
          description: Job details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationJob'  
        '404':
          description: Job not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

    delete:
      tags:
        - Activation Management
      summary: Delete a plan activation job by ID
      description: Deletes a specific plan activation job, typically if it's not in a terminal state (e.g., running, completed, failed).
      operationId: deleteActivationJobById
      responses:
        '204':
          description: Job deleted successfully. No content is returned.
        '404':
          description: Job not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '409': 
          description:  Cannot delete job in its current state (e.g., already running). 
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    patch:
      tags:
        - Activation Management
      summary: Cancel the activation job 
      description: Cancel the activation job
      operationId: cancelActivationJobById      
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'  
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
      responses:
        '202': 
          description: Job cancel request was accepted and cancellation is ongoing 
        '204':
          description: Job cancel request was successfully completed 
        '404':
          description: Job not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Semantic error - e.g. job was not in RUNNING state
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /plan-activation-jobs/{id}/status:
    get:
      tags:
        - Activation Management 
      summary: Get job status 
      description: Retrieve the current status of a specific plan activation job using its unique identifier. 
      operationId: getJobStatus 
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: Unique identifier of the plan activation job.
            example: "Dublin-plan-activation-001"
          required: true 
      responses:
        '200':
          description: Job status retrieved successfully. 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationJobStatus' 
        '404':
          description: Job not found. 
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail' 
        '500': 
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /plan-activation-jobs/{id}/activation-details:
    get:
      tags:
        - Activation Management
      summary: Get activation details
      description: Retrieve detailed information about the activation results of a job
      operationId: getActivationDetails
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: Unique identifier of the plan activation job.
            example: "Dublin-plan-activation-001"
          required: true 
        - name: expand
          in: query
          description: >-
            By default the activation details results shall include the FAILED operations only.  This parameter indicates whether to expand all details of the activation results to also include the 'SUCCEEDED' operations.
          required: false
          schema:
            type: string
            enum:
              - all
      responses:
        '200':
          description: Activation details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionDetails' 
        '404':
          description: Job not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'


  /plan-validation-jobs:  
    post:
      tags:
        - Validation Management
      summary: Create a new plan validation job
      description: Creates and starts a new plan validation job based on an existing plan descriptor.  The new job's ID will be generated by the server and returned in the Location header.
      operationId: createValidationJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationJobRequest'
      responses:
        '201':
          description: Plan validation job created successfully.
                       The response body provides job details, and the Location header points to the new job.
          headers:
            Location:
              description: URI of the created job resource.
              schema:
                type: string
                format: uri-reference
                example: "/plan-validation-jobs/myjob-111"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationJob'
        '400':
          description: Invalid request payload or parameters (e.g., malformed JSON, missing required fields).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

    get:
      tags:
        - Validation Management
      summary: Get plan validation jobs
      description: Retrieve a list of plan validation jobs. 
      operationId: getValidationJobs
      parameters:
        - in: query
          name: job-state
          schema:
            $ref: '#/components/schemas/JobState' 
          description: Filter jobs by their current state.
          example: "job-state=COMPLETED" # Example state for validation jobs
      responses:
        '200':
          description: List of plan validation jobs retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobListEntry'
        '400':
          description: Invalid query parameters
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
                
  /plan-validation-jobs/{id}:  
    parameters:  
      - in: path
        name: id
        schema:
          type: string
          description: Unique identifier of the plan validation job.
          example: "Dublin-plan-validation-001"
        required: true 
    get:
      tags:
        - Validation Management
      summary: Get plan validation job details by ID
      description: Retrieve detailed information about a specific plan validation job using its unique identifier.
      operationId: getValidationJobById
      responses:
        '200':
          description: Job details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationJob'
        '404':
          description: Job not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

    delete:
      tags:
        - Validation Management
      summary: Delete a plan validation job by ID
      description: Deletes a specific plan validation job, typically if it's not in a terminal state (e.g., running, completed, failed).
      operationId: deleteValidationJobById
      responses:
        '204':
          description: Job deleted successfully. No content is returned.
        '404':
          description: Job not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
    patch:
      tags:
        - Validation Management
      summary: Cancel the validation job
      description: Cancel the validation job
      operationId: cancelValidationJobById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
      responses:
        '202': 
          description: Job cancel request was accepted and cancellation is ongoing 
        '204':
          description: Job cancel request was successfully completed 
        '404':
          description: Job not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '422':
          description: Semantic error - e.g. job was not in RUNNING state
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'


  /plan-validation-jobs/{id}/status:
    get:
      tags:
        - Validation Management 
      summary: Get job status 
      description: Retrieve the current status of a specific plan validation job using its unique identifier. 
      operationId: getValidationJobStatus 
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: Unique identifier of the plan validation job.
            example: "Dublin-plan-validation-001"
          required: true 
      responses:
        '200':
          description: Job status retrieved successfully. 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationJobStatus' 
        '404':
          description: Job not found. 
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail' 
        '500': 
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /plan-validation-jobs/{id}/validation-details:
    get:
      tags:
        - Validation Management
      summary: Get validation details
      description: Retrieve detailed information about the validation results of a job
      operationId: getValidationDetails
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: Unique identifier of the plan validation job.
            example: "Dublin-South-plan-validation-001"
          required: true 
        - name: details
          in: query
          description: Selects the level of details to return.
          schema:
            type: string
            enum: [summary, all]
            default: all
      responses:
        '200':
          description: Validation details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionDetails' 
        '404':
          description: Job not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'             
                
components:
  schemas:
    PlanConfigurationDescriptor:
      allOf:
        - $ref: '#/components/schemas/PlanConfigurationDescriptorBaseProperties'
        - type: object
          required:
            - id
            - activationMode
            - lastModifiedAt
            - validationState
            - configChangesContentType
            - configChanges
          properties: 
            id:
              type: string
              description: The identifier of the planned configuration
              example: plan-001
            configChanges:
              description: "The plan configuration changes"
              type: array
              items:
                $ref: '#/components/schemas/ConfigChange'
            validationState:
              type: string
              enum: [NOT_VALIDATED, VALID, INVALID]
              default : NOT_VALIDATED
              description: The validation state of the plan. 
              example: NOT_VALIDATED
            lastModifiedAt:
              type: string
              format: date-time
              description: the last time the plan was modified
              example: 2025-03-06T16:50:26-08:00
            lastValidatedAt:
              type: string
              format: date-time
              description: last time the plan was validated
              example: 2025-03-06T16:50:29-08:00
              
     
    PlanConfigurationDescriptorRequest:
      allOf:
        - $ref: '#/components/schemas/PlanConfigurationDescriptorBaseProperties'
        - type: object
          required:
            - configChanges
          properties: 
            configChanges:
              description: "The plan configuration changes"
              type: array
              items:
                $ref: '#/components/schemas/ConfigChangeWritable'

    PlanConfigurationDescriptorResponse:
      allOf:
        - $ref: '#/components/schemas/PlanConfigurationDescriptor'
        - type: object
          properties: 
            _links:
              $ref: '#/components/schemas/SelfLink'
#              allOf:
#                - $ref: '#/components/schemas/SelfLink'
              example: 
                self:
                  href: "{root-url}/plan-management/v1/plan-descriptors/pd-001"
                  templated: true
                  type: "application/json"
                  title: "The newly created PlanConfigurationDescriptor"

    PlanConfigurationDescriptorBaseProperties:
      type: object
      properties:
        name:
          type: string
          description: Descriptive name of the plan group configuration descriptor
          example: Rollout-5G-Dublin-East
        version:
          type: string
          description: The version of the planned configuration. Its format is implementation specific.
          example: "1.0.0"
        description:
          type: string
          description: Used to describe the purpose of the plan configuration
          example: This is the plan for the new 5G rollout in Dublin east.
        customProperties:
          type: object
          description: A dynamic set of custom properties provided by client
          additionalProperties: true 
          example:
              technology-type: NR
              location: Dublin
        configChangesContentType:
          $ref: '#/components/schemas/ConfigChangesContentType'
        activationMode:
          type: string
          enum: [ATOMIC, BEST_EFFORT, STOP_ON_ERROR] 
          default : BEST_EFFORT
          description: Specifies the execution behavior when the plan is activated
          example: BEST_EFFORT

    PlanConfigurationGroupDescriptor:
      type: object
      required :
        - members
      properties:
        id:
          type: string
          description: Unique id of the plan group configuration descriptor
          example: "plan-001"
        name:
          type: string
          description: Descriptive name of the plan group configuration descriptor
          example: "Rollout-5G-Dublin-East"
        version:
          type: string
          description: version of the plan group configuration descriptor
          example: "1.0.0"
        description:
          type: string
          description: Used to describe the purpose of the plan group configuration
          example: "This is the plan for the new 5G rollout in Dublin east."
        customProperties:
          type: object
          description: A dynamic set of custom properties provided by client
          additionalProperties: true 
          example:
              technology-type: NR
              location: Dublin
        isOrdered:
          type: boolean
          description: Specifies if the members of the planned configuration group are ordered. When ordered, the planned configuration group members shall be validated/activated in the specified order. When not ordered the planned configuration group members can be validated/activated in any order
          default: false
        isFailOnMemberConflicts:
          type: boolean
          description: Specifies if the activation shall fail on detection of conflicts between planned configuration group members, or if the operations shall be processed as if there were no conflicts
          default: false
        activationMode:
          type: string
          enum: [ATOMIC, BEST_EFFORT, STOP_ON_ERROR] 
          default : "BEST_EFFORT"
          description: Specifies the execution behavior when the plan configuration group is activated 
          example: "BEST_EFFORT"
        validationState:
          type: string
          enum: [NOT_VALIDATED, PARTIALLY_VALID, VALID, INVALID]
          default : "NOT_VALIDATED"
          description: The validation state for the last time plan configuration group was validated 
          example: "NOT_VALIDATED"
        lastModifiedAt:
          type: string
          format: date-time
          description: the last time the plan was modified
          example: "2025-03-06T16:50:26-08:00"
        lastValidatedAt:
          type: string
          format: date-time
          description: last time the plan was validated
          example: "2025-03-06T16:50:29-08:00"
        members:
          type: array
          description: list of plan or plan group descriptor identifiers 
          items:
            $ref: '#/components/schemas/Member'
          example:
              - planConfigDescrId: pcd-network-101
              - planConfigGroupDescrId: pgc-europe-east-group
              - planConfigDescrId: pcd-radio-tuning-005
              - planConfigGroupDescrId: pgc-5g-core-rollout
              
    PlanConfigurationGroupDescriptorResponse:
      allOf:
        - $ref: '#/components/schemas/PlanConfigurationGroupDescriptor'
        - type: object
          required:
            - id
            - activationMode
            - validationState
            - isOrdered
            - isFailOnMemberConflicts
            - members
          properties: 
            _links:
              type: object
              description: Hypermedia links for plan descriptor
              $ref: '#/components/schemas/SelfLink'
#              allOf:
#                - $ref: '#/components/schemas/SelfLink'
              example: 
                self:
                  href: "{root-url}/plan-management/v1/plan-group-descriptors/pgd-001"
                  templated: true
                  type: "application/json"
                  title: "The newly created PlanConfigurationGroupDescriptor"   
              

    Member:
      type: object
      description: |
        Defines a member identified by EITHER a single Plan Configuration Descriptor ID 
        OR a Plan Configuration Group Descriptor ID, but not both.
      oneOf:
        - type: object
          required: [planConfigDescrId]
          properties:
            planConfigDescrId:
              type: string
              description: Unique id of the plan configuration descriptor.
              example: "pcd-001"
        - type: object
          required: [planConfigGroupDescrId]
          properties:
            planConfigGroupDescrId:
              type: string
              description: Unique id of the plan configuration group descriptor.
              example: "pgc-001"             

    FallbackConfigurationDescriptor:
      type: object
      properties:
        id:
          type: string
          description: Unique id of the fallback configuration descriptor
          example: "fallback-001"
        name:
          type: string
          description: Descriptive name of the fallback configuration descriptor
          example: "Fallback-Rollout-5G-Dublin-East"
        description:
          type: string
          description: Used to describe the purpose of the fallback configuration
          example: "Fallback for configuration plan Rollout-5G-Dublin-East."
        version:
          type: string
          description: The version of the fallback configuration. Its format is implementation specific.
          example: 1.0.0
        customProperties:
          type: object
          description: A dynamic set of custom properties provided by client
          additionalProperties: true 
          example:
              technology-type: NR
              location: Dublin
        activationJob:
          type: string
          description: The identifier of the related activation job.
      required:
        - activationJob
      oneOf:
        - type: object
          description: COMPLETE_RESTORE type fallback
          required:
            - fallbackConfig
          properties:
            fallbackConfig:
              type: string
              description: The fallback configuration associated with COMPLETE_RESTORE
        - type: object
          description: The configuration changes associated with UNDO type fallback
          properties:
            configChangesContentType:
              $ref: '#/components/schemas/ConfigChangesContentType'
            configChanges:
              type: array
              description: |
                The configuration change set specifying the configuration in case the fallback configuration is of the "UNDO" type. The format of "configChanges" is specified in "configChangesContentType". Exactly one of this element or the fallbackConfig shall be present.
              items:
                $ref: '#/components/schemas/ConfigChangeWritable'   
          required:
            - configChanges
            - configChangesContentType           
              
    FallbackConfigurationDescriptorResponse:
      allOf:
        - $ref: '#/components/schemas/FallbackConfigurationDescriptor'
        - type: object
          properties: 
            _links:
              type: object
              description: Hypermedia links for fallback descriptor
              $ref: '#/components/schemas/SelfLink'
#              allOf:
#                - $ref: '#/components/schemas/SelfLink'
              example: 
                self:
                  href: "{root-url}/plan-management/v1/fallback-descriptors/pd-001"
                  templated: true
                  type: "application/json"
                  title: "The newly created FallbackConfigurationDescriptor"     

    TriggerDescriptorRequest:
      $ref: '#/components/schemas/TriggerDescriptorBaseProperties'
#      allOf:
#        - $ref: '#/components/schemas/TriggerDescriptorBaseProperties'
    TriggerDescriptorResponse:
      allOf:
        - $ref: '#/components/schemas/TriggerDescriptor'
        - type: object
          properties: 
            _links:
              type: object
              description: Hypermedia links for trigger descriptor
              $ref: '#/components/schemas/SelfLink'
#              allOf:
#                - $ref: '#/components/schemas/SelfLink'
              example: 
                self:
                  href: "{root-url}/plan-management/v1/trigger-descriptors/trigger-001"
                  templated: true
                  type: "application/json"
                  title: "The newly created TriggerDescriptor"

    TriggerDescriptorBaseProperties:
      type: object
      required:
        - conditionExpression
        - evaluationPeriod
        - activationJobs
      properties:
        name:
          type: string
          description: Descriptive name of the trigger descriptor
          example: "Rollout-5G-Dublin-East"
        description:
          type: string
          description: Used to describe the purpose of the trigger
          example: "This is the plan for the new 5G rollout in Dublin east."
        version:
          type: string
          description: an optional version for the Trigger Descriptor
          example: "1.0.0"
        customProperties:
          type: object
          description: A dynamic set of custom properties provided by client
          additionalProperties: true 
          example:
              technology-type: NR
              location: Dublin
        conditionExpression:
          type: string
          description: The condition expression
        activationJobs:
          type: array
          items:
            type : string
          description: The identifiers of one or more activation jobs that shall be triggered by this condition.
        startEvaluationAt:
          type: string
          format: date-time
          description: The date and time at which the evaluation of the condition expression shall start. The evaluation result is set to "False" before that date and time. If the information element is not specified, evaluation of the trigger condition shall start immediately.
          example: "2025-03-06T16:50:26-08:00"
        stopEvaluationAt:
          type: string
          format: date-time
          description: The date and time at which the evaluation of the condition expression shall stop. The evaluation result is set to "False" after that date and time. If the information element is not specified, evaluation of the trigger condition shall continue until the deletion of the trigger condition descriptor.
          example: "2025-03-06T16:50:26-08:00"
        isTriggerOnce:
          type: boolean
          default : true
          description: The boolean indication, if the trigger is disarmed after the first firing.
          example: false
        evaluationPeriod:
          type: integer
          description: The evaluation period specifies the interval of time in seconds  between two consecutive condition expression evaluations.
        hysteresis:
          type: object
          $ref: '#/components/schemas/Hysteresis'
#          allOf:
#           - $ref: '#/components/schemas/Hysteresis'
          description: The hysteresis, when present, specifies that the trigger shall not be activated immediately when the evaluation result changes from false to true or a specified number of times.  Values greater or equal to 1 are allowed
      additionalProperties: true

    Hysteresis:
      type: object
      properties: 
        timeOfTrueEvaluations:
          type: integer
          description: The hysteresis, when present, specifies that the trigger shall not be activated immediately, when the evaluation result changes from false to true, but only when the evaluation results is true for a specified time (which must be a multiple of the evaluation period). Unit is seconds
        numberOfTrueEvaluations:
          type: integer
          description: This information element, when present, specifies that the trigger shall not be activated immediately, when the evaluation result changes from false to true, but only when the evaluation results is true for a specified time (which must be a multiple of the evaluation period) or a specified number of times.

    TriggerDescriptor:
      allOf:
        - $ref: '#/components/schemas/TriggerDescriptorBaseProperties'
        - type: object
          properties:
            id:
              type: string
              description: Unique id of the plan configuration descriptor
              example: "trigger-001"
            currentEvaluationResult:
              type: boolean
              default : false
              description: The current result of evaluating the "condition-expression".
              example: false
            lastModifiedAt:
              type: string
              format: date-time
              description: The date and time at which the trigger condition was modified the last time by a MnS consumer. Upon creation of the trigger condition descriptor the value of the information element is set to the date and time at which the descriptor is created.
              example: "2025-03-06T16:50:29-08:00"
            lastTriggeredAt:
              type: string
              format: date-time
              description: The date and time at which the evaluation result of the trigger condition changed the last time from "False" to "True".
              example: "2025-03-06T16:50:29-08:00"
            isTriggerActive:
              type: boolean
              default : false
              description: The indication if the trigger can start activation jobs (trigger is active), or if the trigger cannot start activation jobs (trigger is inactive).
              example: false
          required:
            - conditionExpression
            - evaluationPeriod

    DescriptorListEntry: 
      type: object
      properties:
        id:
          type: string
          description: id of the descriptor.
          example: plan-descriptor-1
        name:
          type: string
          description: name of the descriptor.
          example: Dublin East Rollout
        version:
          type: string
          description: version of the descriptor.
          example: "1.0.0"
        description:
          type: string
          description: description/purpose of the descriptor.
          example: "plan-descriptor-1"
      required :
        - id
        
    JobListEntry: 
      allOf:
        - type: object
          properties:
            id:
              type: string
              description: id of the job.
              example: plan-job-1
            name:
              type: string
              description: name of the job.
              example: Dublin East Rollout Job
            description:
              type: string
              description: description/purpose of the job.
              example: Job to do dublin east rollout
            jobState:
              $ref: '#/components/schemas/JobState'
          required :
            - id
            - jobState

    ActivationJobWritableProperties:
      type: object  
      properties:
        name:
          type: string
          description: Name of the activation job
          example: "Dublin East Cell Deployment"
        description:
          type: string
          description: Human-readable description of the job
          example: "Optimize the Dublin area network"
        mnsConsumerId:
          type: array
          description: The consumer that created and/or started the job. It may indicated a human user and/or one or more applications initiating the job. E.g. ["userid:janedoe", "appid:12314"] 
          items:
            type: string
        isFallbackEnabled:
          type: boolean
          description: Whether fallback should be enabled for this job
          default: false
        serviceImpact:
          type: string
          enum: [LEAST_SERVICE_IMPACT, SHORTEST_TIME]
          description: Additional job-specific parameters
          default: "SHORTEST_TIME"
        isImmediateActivation:
          type: boolean
          description: Specifies if the activation job shall start immediately or, alternatively, by conditional activation.
          default: true
      oneOf:
          - $ref: '#/components/schemas/PlanRef'
          - $ref: '#/components/schemas/PlanGroupRef'
          - $ref: '#/components/schemas/EmbeddedPlan'
          - $ref: '#/components/schemas/EmbeddedPlanGroup'
          - $ref: '#/components/schemas/FallbackPlanRef'     
      example:
        {
          "name" : "5G-Dublin-East-Rollout",
          "description" : "Optimize the 5G network in Dublin East",
          "planConfigDescr" : {
            "activationMode" : "ATOMIC",  
            "customProperties" : {
              "technology-type": "NR",
              "location": "Dublin"
            },
            "configChangesContentType" : "YANG_BASED", 
            "configChanges": [
              {
                "modifyOperator": "merge",
                "changeId": "Dublin-Center_DC-01_555777999",
                "target": "/SubNetwork=Dublin-Center/ManagedElement=DC-001/NRCellDU=1",
                "value": {
                    "ssbDuration": 2
                }
              }
            ]
          }
        }

    PlanRef:
      type: object
      required: [planConfigDescrId]
      properties:
        planConfigDescrId:
          type: string

    EmbeddedPlan:
      type: object
      required: [planConfigDescr]
      properties:
        planConfigDescr:
          $ref: '#/components/schemas/PlanConfigurationDescriptorRequest'

    PlanGroupRef:
      type: object
      required: [planConfigGroupDescrId]
      properties:
        planConfigGroupDescrId:
          type: string

    EmbeddedPlanGroup:
      type: object
      required: [planConfigGroupDescr]
      properties:
        planConfigGroupDescr:
          $ref: '#/components/schemas/PlanConfigurationGroupDescriptor'

    FallbackPlanRef:
      type: object
      required: [fallbackConfigDescrId]
      properties:
        fallbackConfigDescrId:
          type: string

    ActivationJobStatus:
      allOf:     
        - type: object
          properties:
            jobState: { $ref: '#/components/schemas/JobState' }
            activationState: { $ref: '#/components/schemas/ActivationState' }
            startedAt: { type: string, format: date-time }
            stoppedAt: { type: string, format: date-time }
          required: [jobState, activationState]


    ActivationJob:
      allOf:
        - $ref: '#/components/schemas/ActivationJobWritableProperties'      
        - type: object
          properties:
            id:
              type: string
              description: id of the activation job
              example: "job-id-3985199134"
            jobState:
              $ref: '#/components/schemas/JobState'
#              allOf:
#                - $ref: '#/components/schemas/JobState'
              example: "COMPLETED"
            activationState:
              $ref: '#/components/schemas/ActivationState'
#              allOf:
#                - $ref: '#/components/schemas/ActivationState'
              example: "ACTIVATED"
            startedAt:
              type: string
              format: date-time
              example: "2024-12-02T13:16:54.088Z"
            stoppedAt:
              type: string
              format: date-time
              example: "2024-12-02T13:16:58.088Z"   
            jobDetails:
              $ref: '#/components/schemas/JobDetails'
#              allOf:
#                - $ref: '#/components/schemas/JobDetails'
            activationDetails:
              $ref: '#/components/schemas/ExecutionDetails'
#              allOf:
#                - $ref: '#/components/schemas/ExecutionDetails'
            cancelRequest:   
              type: boolean
              description: This boolean attribute allows to request to cancel the activation process by setting its value to "True". Setting the value to "False" has no observable result. Once the value is set to "True" it is immutable
              default: false
            createdFallbackConfigDescrId:   
              type: string
              description: Id of the created Fallback Plan Configuration Descriptor
              example: "fallback-plan-descriptor-001"
            _links:
              $ref: '#/components/schemas/ActivationJobLinks'
          required: [id, jobState, jobDetails, activationState, activationDetails, _links]
          additionalProperties : true
        
    ValidationJobRequest:
      $ref: '#/components/schemas/ValidationJobBaseProperties'
#      allOf:
#        - $ref: '#/components/schemas/ValidationJobBaseProperties' 
      example:
        {
          "name" : "5G-Dublin-East-Rollout",
          "description" : "Optimize the 5G network in Dublin East",
          "planConfigDescr" : {
            "activationMode" : "ATOMIC",  
            "customProperties" : {
              "technology-type": "NR",
              "location": "Dublin"
            },
            "configChangesContentType" : "YANG_BASED",
            "configChanges": [
              {
                "modifyOperator": "merge",
                "changeId": "Dublin-Center_DC-01_555777999",
                "target": "/SubNetwork=Dublin-Center/ManagedElement=DC-001/NRCellDU=1",
                "value": {
                    "ssbDuration": 2
                }
              }
            ]
          }
        }

    ValidationJobBaseProperties:
      type: object    
      properties:
        name:
          type: string
          description: Name of the validation job
          example: "Dublin East Cell Deployment"
        description:
          type: string
          description: Human-readable description of the job
          example: "Optimize the Dublin area network"
        mnsConsumerId:
          type: array
          description: The consumer that created and/or started the job. It may indicated a human user and/or one or more applications initiating the job. E.g. ["userid:janedoe", "appid:12314"] 
          items:
            type: string
        validationMode:
          type: string
          enum: [CONTINUE_ON_ERROR, STOP_ON_ERROR] 
          default : "CONTINUE_ON_ERROR"
          description: Specifies the execution behavior when the plan is activated          

      oneOf:
          - $ref: '#/components/schemas/PlanRef'
          - $ref: '#/components/schemas/PlanGroupRef'
          - $ref: '#/components/schemas/EmbeddedPlan'
          - $ref: '#/components/schemas/EmbeddedPlanGroup'
          - $ref: '#/components/schemas/FallbackPlanRef'     
      example:
        {
          "name" : "5G-Dublin-East-Rollout",
          "description" : "Optimize the 5G network in Dublin East",
          "planConfigDescr" : {
            "activationMode" : "ATOMIC",  
            "customProperties" : {
              "technology-type": "NR",
              "location": "Dublin"
            },
            "configChangesContentType" : "YANG_BASED", 
            "configChanges": [
              {
                "modifyOperator": "merge",

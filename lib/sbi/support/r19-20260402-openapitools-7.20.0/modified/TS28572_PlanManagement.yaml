    JobState:
      type: string
      enum: [NOT_STARTED, QUEUED, RUNNING, CANCELLING, CANCELLED, COMPLETED, FAILED]
      default: NOT_STARTED
      example: "COMPLETED"
  
    JobDetails:
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
      additionalProperties: true


    ExecutionDetails:
      type: object
      description: Details of the execution of the operations that are contained in the planned configuration or planned configuration group referenced in the job.
      properties:
        summary:
          $ref: '#/components/schemas/SummaryStatus'
        results:
          type: array  
          items:
            $ref: '#/components/schemas/Result'
        memberConflicts:
          type: array  
          items:
            $ref: '#/components/schemas/MemberConflict'
      example:
        summary:
          notFinished: 0
          succeeded: 1
          failed: 0
          rollbackSucceeded: 0
          rollbackFailed: 0
          conflicting: 0
        results: []
        memberConflicts: []


    ValidationState:
      type: string
      enum: [UNKNOWN, VALIDATION_SUCCEEDED, VALIDATION_FAILED]
      example: "VALIDATION_SUCCEEDED"

    ActivationState:
      type: string
      enum: [NOT_STARTED, ACTIVATED, ACTIVATION_FAILED, PARTIALLY_ACTIVATED, ACTIVATION_FAILED_ROLLED_BACK, ACTIVATION_FAILED_ROLLBACK_FAILED]
      example: "ACTIVATED"
      
    Result:
      type: object
      description: Details of the execution of the operations that are contained in the planned configuration.
      properties:
        planConfigDescrId:
          type: string
          description : If planned configuration groups are activated, this information elements specifies the planned configuration descriptor identifier, for which error details are reported. If a planned configuration is activated or validated, this information element is absent.
          example: "descriptor-001"
        state:
          type: string
          enum: [NOT_STARTED, PROCESSING, SUCCEEDED, FAILED]
          default: NOT_STARTED
          description: The state of the operation activation.
          example: "SUCCEEDED"
        target:
          type: string
          example: "/SubNetwork=1/MeContext=2/ManagedElement=3"
        errors:
            type: array
            items:
              $ref: '#/components/schemas/ErrorDetail'
      required:
        - target
        - state
#      oneOf:
#        - required:
#            - changeId
#          properties:
#            changeId:
#              type: string
#              description: The identifier of the operation. It may or may not be provided If provided, it shall be unique within an instance of "configChanges" and it shall be provided for all changes in "configChanges".
#              example: "change-cell-001-1"
#        - required:
#            - changeIndex
#          properties:
#            changeIndex:
#              type: integer
#              description: The identification of the operation. It is the positional index of the operation in the operation set ("changeIndex"). The positional index of the leftmost element is "0". Exactly one of "changeId" or "changeIndex" shall be provided.
#              example: 0
      example:
        changeId: changeId-002-update-config
        target: /SubNetwork=1/MeContext=2/ManagedElement=3
        state: FAILED
        errors:
          - type: VALIDATION_ERROR
            title: Validation Error
            reason: VALUE_INVALID
            detail: The provided value 'some-value' for 'someAttr' is not allowed. Valid values are 'some-value-x', 'some-value-y'.
            path: /SubNetwork=1/MeContext=2/ManagedElement=3/attributes/someAttr
            errorInfo:
              attributeName: someAttr
              invalidValue: some-value

    SummaryStatus:
      type: object
      properties:
        notFinished:
          type: integer
          example: 1
        succeeded:
          type: integer
          example: 3
        failed:
          type: integer
          example: 3
        rollbackSucceeded:
          type: integer
          example: 0
        rollbackFailed:
          type: integer
          example: 0
        conflicting:
          type: integer
          example: 0

    MemberConflict:
      type: object
      properties:
        memberConflict :
          type: array
          items:
            $ref: '#/components/schemas/MemberOp'

    MemberOp:

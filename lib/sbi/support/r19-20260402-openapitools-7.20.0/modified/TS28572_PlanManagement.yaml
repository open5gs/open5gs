    ConfigChangesContentType:
      type: string
      description: The supported configuration content types.
      enum:
        - YANG_BASED  # confliguration format is aligned with RFC 9751 modelling specifications with some relaxed rules
        - OPENAPI_BASED  # confliguration format is aligned with an OpenAPI model definition  
      default: YANG_BASED    

    CancelRequest:
      type: object
      properties:
        cancelRequest:
          type: boolean
          description: Must be set to true to initiate cancellation.
          # Restricts the boolean to only allow the 'true' value
          enum: [true]
      required:
        - cancelRequest
      # This ensures no other fields (like status or priority) can be sent in this specific PATCH
      additionalProperties: false

    ErrorDetail:
      type: object
      properties:
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: "Data already exists; cannot be created"
        type:
          type: string
          description: The type of the error
          enum: 
            - SCHEMA_VALIDATION_ERROR
            - DATA_NODE_TREE_ERROR
            - MODIFICATION_NOT_ALLOWED
            - ACCESS_CONTROL_CONFLICT
            - APPLICATION_LAYER_ERROR
            - SERVER_ERROR
            - OTHER
        reason:
          type: string
          enum:
            - NEW_DATA_NODE_NAME_INVALID
            - NEW_DATA_NODE_VALUE_INVALID
            - NEW_DATA_NODE_CONTAINMENT_INVALID
            - FINAL_DATA_NODE_VALUE_INVALID
            - FINAL_DATA_NODE_UNIQUENESS_INVALID
            - FINAL_DATA_NODE_MULTIPLICITY_INVALID
            - FINAL_DATA_NODE_CARDINALITY_INVALID
            - TARGET_DATA_NODE_NOT_FOUND
            - TARGET_DATA_NODE_PARENT_NOT_FOUND
            - TARGET_DATA_NODE_FOUND
            - TARGET_DATA_NODE_NOT_WRITABLE
            - TARGET_DATA_NODE_INVARIANT
            - TARGET_DATA_NODE_CREATION_NOT_ALLOWED
            - TARGET_DATA_NODE_DELETION_NOT_ALLOWED
            - ACCESS_DENIED
            - OTHER
          example: "NEW_DATA_NODE_CONTAINMENT_INVALID"
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: "NRCellDU=1234 already exists in the network"
        badDataNode:
          type: string
          example: "/_3gpp-common-subnetwork:SubNetwork=Irl/_3gpp-common-mecontext:MeContext=Dublin-1"
        errorInfo : 
          type: object
          description: additional error info (e.g. stackdump)
          additionalProperties: true
      required:
        - type
        - badDataNode
          
    LinkObject:
      type: object
      description: Defines the structure of a single hypermedia link.
      properties:
        href:
          type: string
          format: uri-reference # Use uri-reference for relative paths (allows for absolute or relative uri)
          description: The target URI of the link.
        templated:
          type: boolean
          description: Indicates if the href is a URI Template (RFC 6570).
          default: true
        type:
          type: string
          description: The content type expected when following this link (MIME type).
        title:
          type: string
          description: A human-readable title that describes the link's purpose.
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH]
          description: The HTTP method to use for this action link.
      required:
        - href

    SelfLink:
      type: object
      description: Hypermedia links for this resource, including fixed and dynamic relations.
      properties:
        self:
          $ref: '#/components/schemas/LinkObject'
#          allOf:
#            - $ref: '#/components/schemas/LinkObject'
          description: A link to the resource itself.
      # additionalProperties to allow any other dynamic links
      additionalProperties:
        $ref: '#/components/schemas/LinkObject' # Any other link will conform to LinkObject schema
      required:
        - self 
      example: # demonstrates a typical _links object in an actual response
        self:
          href: "{root-url}/plan-management/v1/plan-descriptors/pd-001"
          templated: true
          type: "application/json"
          title: "The newly created PlanConfigurationDescriptor"
        help:
          href: "{root-url}/help-service/v1/topics/plan-descriptors"
          templated: true
          type: "application/json"
          title: "online help for the plan descriptor"
openapi: 3.0.0

info:
  version: '1.4.1'
  title: 'Nudm_PP'
  description: |
    Nudm Parameter Provision Service.  
    © 2026, 3GPP Organizational Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).  
    All rights reserved.

externalDocs:
  description: 3GPP TS 29.503 Unified Data Management Services, version 19.6.0
  url: 'https://www.3gpp.org/ftp/Specs/archive/29_series/29.503/'

servers:
  - url: '{apiRoot}/nudm-pp/v1'
    variables:
      apiRoot:
        default: https://example.com
        description: apiRoot as defined in clause 4.4 of 3GPP TS 29.501.

security:
  - oAuth2ClientCredentials:
    - nudm-pp
  - {}

paths:
  /{ueId}/pp-data:
    get:
      summary: Get Parameter Provisioning Data
      operationId: Get PP Data
      tags:
        - Parameter Provisioning Data (Document)
      parameters:
        - name: ueId
          in: path
          description: Identifier of the UE
          required: true
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/VarUeId'
#            anyOf:
#              - $ref: 'TS29571_CommonData.yaml#/components/schemas/VarUeId'
#              - $ref: 'TS29503_Nudm_SDM.yaml#/components/schemas/ExtGroupId'
        - name: af-instance-id
          in: query
          description: Application Function Instance Identifier
          schema:
            type: string
        - name: mtc-provider-information
          in: query
          description: MTC Provider Information
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/MtcProviderInformation'
        - name: supported-features
          in: query
          description: Features required to be supported by the target NF
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      responses:
        '200':
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PpData'
        '400':
          $ref: 'TS29571_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29571_CommonData.yaml#/components/responses/401'
        '403':

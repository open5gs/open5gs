#
    GroupMembListChanges:
      description: Represents information on the change(s) to a group's members list.
      type: object
      properties:
        addedUEs:
          type: array
          items:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/Gpsi'
          minItems: 1
        removedUEs:
          type: array
          items:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/Gpsi'
          minItems: 1
      anyOf:
      - required: [addedUEs]
      - required: [removedUEs]

    UpLocRepAddrAfRm:
      description: Represents the user plane addressing information.
      type: object
      properties:
        ipv4Addrs:
          type: array
          items:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/Ipv4Addr'
          minItems: 1
        ipv6Addrs:
          type: array
          items:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/Ipv6Addr'
          minItems: 1
        fqdn:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Fqdn'
      nullable: true
      anyOf:
      - required: [ipv4Addrs]
      - required: [ipv6Addrs]
      - required: [fqdn]

    UpCumEvtRep:
      description: Represents the cumulative event report.
      type: object
      properties:
        upLocRepStat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'

    UeStrAndFwdSatInfo:
      description: Contains the Store and Forward operation information for satellite access.
      type: object
      properties:
        ueStrAndFwdStatus:
          $ref: '#/components/schemas/UeStrAndFwdStatus'
        externalId:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/ExternalId'
        msisdn:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/Msisdn'
        estTime:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DurationSec'
        fLinkAvail:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/TimeWindow'
      required:
        - ueStrAndFwdStatus
#      oneOf:
#      - required: [externalId]
#      - required: [msisdn]
#
    EnergyInfo:
      description: Contains the Energy consumption information for the UE.
      type: object
      properties:
        energy:
          format: float
          type: number
          minimum: 0
      required:
        - energy

#
# ENUMS
#
    MonitoringType:
#      anyOf:
#      - type: string
      type: string
      enum:
        - LOSS_OF_CONNECTIVITY
        - UE_REACHABILITY
        - LOCATION_REPORTING
        - CHANGE_OF_IMSI_IMEI_ASSOCIATION
        - ROAMING_STATUS
        - COMMUNICATION_FAILURE
        - AVAILABILITY_AFTER_DDN_FAILURE
        - NUMBER_OF_UES_IN_AN_AREA
        - PDN_CONNECTIVITY_STATUS
        - DOWNLINK_DATA_DELIVERY_STATUS
        - API_SUPPORT_CAPABILITY
        - NUM_OF_REGD_UES
        - NUM_OF_ESTD_PDU_SESSIONS
        - AREA_OF_INTEREST
        - GROUP_MEMBER_LIST_CHANGE
        - APPLICATION_START
        - APPLICATION_STOP
        - SESSION_INACTIVITY_TIME
        - TRAFFIC_VOLUME
        - UL_DL_DATA_RATE
        - STR_FWD_SAT_INFO
        - UE_ENERGY
        - PDU_SESSION_ENERGY
        - SERVICE_FLOW_ENERGY
        - UE_SNSSAI_ENERGY
#      - type: string
#        description: >
#          This string provides forward-compatibility with future
#          extensions to the enumeration but is not used to encode
#          content defined in the present version of this API.
#      description: |
#        Represents a monitoring event type.  
#        Possible values are
#        - LOSS_OF_CONNECTIVITY: The SCS/AS requests to be notified when the 3GPP network detects
#          that the UE is no longer reachable for signalling or user plane communication
#        - UE_REACHABILITY: The SCS/AS requests to be notified when the UE becomes reachable for
#          sending either SMS or downlink data to the UE
#        - LOCATION_REPORTING: The SCS/AS requests to be notified of the current location or
#          the last known location of the UE
#        - CHANGE_OF_IMSI_IMEI_ASSOCIATION: The SCS/AS requests to be notified when the association
#          of an ME (IMEI(SV)) that uses a specific subscription (IMSI) is changed
#        - ROAMING_STATUS: The SCS/AS queries the UE's current roaming status and requests to get
#          notified when the status changes
#        - COMMUNICATION_FAILURE: The SCS/AS requests to be notified of communication failure events
#        - AVAILABILITY_AFTER_DDN_FAILURE: The SCS/AS requests to be notified when the UE has become
#          available after a DDN failure
#        - NUMBER_OF_UES_IN_AN_AREA: The SCS/AS requests to be notified the number of UEs in a given
#          geographic area
#        - PDN_CONNECTIVITY_STATUS: The SCS/AS requests to be notified when the 3GPP network detects
#          that the UE’s PDN connection is set up or torn down. When the "EnPduSesRatType" feature is
#          supported, the AF also requests to report the new RAT Type when RAT Type is changed or the
#          current RAT Type when the PDU Session is established or released.
#        - DOWNLINK_DATA_DELIVERY_STATUS: The AF requests to be notified when the 3GPP network
#          detects that the downlink data delivery status is changed.
#        - API_SUPPORT_CAPABILITY: The SCS/AS requests to be notified of the availability of support
#          of service APIs.
#        - NUM_OF_REGD_UES: The AF requests to be notified of the current number of registered UEs
#          for a network slice.
#        - NUM_OF_ESTD_PDU_SESSIONS: The AF requests to be notified of the current number of
#          established PDU Sessions for a network slice.
#        - AREA_OF_INTEREST: The SCS/AS requests to be notified when the UE(i.e. UAV) moves in or
#          out of the geographic area.
#        - GROUP_MEMBER_LIST_CHANGE: The AF requests to be notified of the changes to a group members
#          list.
#        - APPLICATION_START: The AF requests to be notified about the start of application traffic
#          has been detected.
#        - APPLICATION_STOP: The AF requests to be notified about the stop of application traffic
#          has been detected.
#        - SESSION_INACTIVITY_TIME: The AF requests to be notified of session inactivity time of the
#          measured UE PDU Session.
#        - TRAFFIC_VOLUME: The AF requests to be notified of traffic volume of the measured UE.
#        - UL_DL_DATA_RATE: The AF requests to be notified of uplink and downlink data rate of the
#          measured UE.
#        - STR_FWD_SAT_INFO: The SCS/AS requests to be notified of the support of Store and
#          Forward Satellite Operation.
#        - UE_ENERGY: The AF requests to be notified about the total energy consumed by the UE.
#        - PDU_SESSION_ENERGY: The AF requests to be notified about the total energy consumed
#          by a PDU session of a UE.
#        - SERVICE_FLOW_ENERGY: The AF requests to be notified about the total energy consumed
#          by an application or service data flow of an application traffic of a UE.
#        - UE_SNSSAI_ENERGY: The AF requests to be notified about the total energy consumed
#          by a UE in an S-NSSAI.
#
    ReachabilityType:
#      anyOf:
#      - type: string
      type: string
      enum:
        - SMS
        - DATA
#      - type: string
#        description: >
#          This string provides forward-compatibility with future
#          extensions to the enumeration but is not used to encode
#          content defined in the present version of this API.
#      description: |
#        Represents a reachability type.  
#        Possible values are
#        - SMS: The SCS/AS requests to be notified when the UE becomes reachable for sending SMS
#          to the UE
#        - DATA: The SCS/AS requests to be notified when the UE becomes reachable for sending
#          downlink data to the UE.
#
    LocationType:
#      anyOf:
#      - type: string
      type: string
      enum:
        - CURRENT_LOCATION
        - LAST_KNOWN_LOCATION
        - CURRENT_OR_LAST_KNOWN_LOCATION
        - INITIAL_LOCATION
#      - type: string
#        description: >
#          This string provides forward-compatibility with future
#          extensions to the enumeration but is not used to encode
#          content defined in the present version of this API.
#      description: |
#        Represents a location type.  
#        Possible values are
#        - CURRENT_LOCATION: The SCS/AS requests to be notified for current location
#        - LAST_KNOWN_LOCATION: The SCS/AS requests to be notified for last known location
#        - CURRENT_OR_LAST_KNOWN_LOCATION: The AF requests the current or last known location
#        - INITIAL_LOCATION: The AF requests the initial location
#
    AssociationType:
#      anyOf:
#      - type: string
      type: string
      enum:
        - IMEI
        - IMEISV
#      - type: string
#        description: >
#          This string provides forward-compatibility with future
#          extensions to the enumeration but is not used to encode
#          content defined in the present version of this API.
#      description: |
#        Represents an IMEI or IMEISV to IMSI association.  
#        Possible values are
#        - IMEI: The value shall be used when the change of IMSI-IMEI association shall be detected
#        - IMEISV: The value shall be used when the change of IMSI-IMEISV association shall be
#          detected
#
    Accuracy:
#      anyOf:
#      - type: string
      type: string
      enum:
        - CGI_ECGI
        - ENODEB
        - TA_RA
        - PLMN
        - TWAN_ID
        - GEO_AREA
        - CIVIC_ADDR
#      - type: string
#        description: >
#          This string provides forward-compatibility with future
#          extensions to the enumeration but is not used to encode
#          content defined in the present version of this API.
#      description: |
#        Represents a desired granularity of accuracy of the requested location information.  

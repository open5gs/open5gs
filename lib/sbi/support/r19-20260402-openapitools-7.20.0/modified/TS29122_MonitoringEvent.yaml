        edrxCycleLength:
          format: float
          type: number
          minimum: 0
        suggestedNumberOfDlPackets:
          type: integer
          minimum: 0
          description: >
            Identifies the number of packets shall be buffered in the serving gateway.
            It shall be present if the idle status indication is requested by the SCS/AS

#          This string provides forward-compatibility with future
#          extensions to the enumeration and is not used to encode
#          content defined in the present version of this API.
#      description: |
#        Represents supported AIML role identity of the FL member.  
#        Possible values are:
#        - FL_CLIENT: Identifies the supported AIML role of FL member is used as FL client.
#        - FL_SERVER: Identifies the supported AIML role of FL member is used as FL server.

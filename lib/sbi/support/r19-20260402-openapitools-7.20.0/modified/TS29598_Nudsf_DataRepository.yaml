components:
  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: '{nrfApiRoot}/oauth2/token'
          scopes:
            nudsf-dr: Access to the nudsf-dr API
            nudsf-dr:record:read: Access to read records
            nudsf-dr:record:modify: Access to update records
            nudsf-dr:record:create: Access to create records
            nudsf-dr:record-meta:read: Access to read a record's meta
            nudsf-dr:record-meta:modify: Access to update a record's meta
            nudsf-dr:block:read: Access to read blocks
            nudsf-dr:block:modify: Access to update blocks
            nudsf-dr:block:create: Access to create blocks
            nudsf-dr:subscription:read: Access to read subscriptions
            nudsf-dr:subscription:modify: Access to update subscriptions
            nudsf-dr:subscription:create: Access to create subscriptions
            nudsf-dr:meta-schema:read: Access to read meta schema
            nudsf-dr:meta-schema:modify: Access to update meta schema
            nudsf-dr:meta-schema:create: Access to create meta schema

  schemas:
    RecordSearchResultDescriptor:
      description: Count and collection of Record references matching the providing filter.
      type: object
      properties:
        count:      # The total number of elements found.
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        references: # The Record references found. If count-indicator is true, no references are sent back.
          type: array
          items:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
          minItems: 1
        supportedFeatures:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
        tagCountResult:
          description: A map of TagCount (list of key-value pairs with unique indentifier as key)
          type: object
          items:
            $ref: '#/components/schemas/TagCount'
          example: {"advancedTagCount1" : {"tag1" : 1}, "advancedTagCount2" : {"tag2" : 2}}
      required:
        - count

    RecordSearchResult:
      description: Record search result
      type: object
      properties:
        descriptor:
          # json representation of the search result descriptor
          $ref: '#/components/schemas/RecordSearchResultDescriptor'
        matchingRecords:
          # List of multipart data
          type: array
          description: list of Records
          items:
            $ref: '#/components/schemas/Record'
      required:
        - descriptor
        - matchingRecords
      example: >-
        { "descriptor": { "count": 1, "references": [ "realmABC/storageXYZ/records/record123" ] }, "matchingRecords": [ { "meta": { "tags" : { "tag1" : ["value1"], "tag2" :["value2"] } }, "blocks": [ { "Content-Id": "record123/block1", "Content-Type": "text/plain", "content": "QmxvY2sgY29udGVudA==" } ] } ] }

    RecordMeta:
      description: Meta data of a Record
      type: object
      properties:
        ttl:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/DateTime'
        callbackReference:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
        tags:
          type: object # dictionary type
          description: >
            A dictionary of {"tagName": [ "tagValue", ...] }. A tag name can be used
            to retrieve a Record. The tagValue are unique.
          additionalProperties:
            type: array
            items:
              type: string
            uniqueItems: true
            minItems: 1
          minProperties: 1
          example:  '{"ueId" : [ "455345", "455346" ], "recordId" : [ "1000106" ] }'
      example: >-
        { "tags" : {"ueId" : [ "455345", "455346" ], "recordId" : [ "1000106" ] }}
        schemaId:
          $ref: '#/components/schemas/SchemaId'

    Record:
      description: Definition of a Record
      type: object
      properties:
        meta:
          # json representation of the Meta Data
          $ref: '#/components/schemas/RecordMeta'
        blocks:
          # List of multipart data
          type: array
          description: list of opaque Block's in this Record
          items:
            $ref: '#/components/schemas/Block'
          minItems: 1
      required:
        - meta
      example: >-
        {"meta": { "tags" : {"tag1" : ["value1"], "tag2" :["value2"] } }, "blocks": [{"Content-Id": "userDefBinaryBlob", "Content-Type": "text/plain", "content": "QmxvY2sgY29udGVudA=="}, {"Content-Id": "userDefJsonBlob", "Content-Type": "application/json", "content": "{"key": "ftsimpletype-999550000000002", "value": "A3E71A78377179B5B91A;imsi-999550000000123"}]}

    RecordPatch:
      description: Definition of a Record Patch
      type: object
      properties:
        patch:
          # json patch as defined in RFC 6902
          type: array
          items:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/PatchItem'
          minItems: 1
        blocks:
          # List of multipart data
          type: array
          description: list of opaque Block's being referred to by PatchItems
          items:
            $ref: '#/components/schemas/Block'
          minItems: 1
      required:
        - patch
      example: >-
        {"patch": [{ "op": "add", "path": "/meta/callbackReference", "value": "https://example.com" }, { "op": "copy", "from": "/blocks/blockID1", "to": "/blocks/blockID2" }, { "op": "add", "path": "/blocks/blockID1", "value": "addedBlock1" }], "blocks": [{"Content-Id": "addedBlock1", "Content-Type": "text/plain", "content": "QmxvY2sgY29udGVudA=="}]}

    RecordIdList:
      description: List of Record IDs
      type: object
      properties:
        recordIdList:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - recordIdList

    FailedRecordIdList:
      description: List of Record IDs that failed to be deleted
      type: object
      properties:
        failedRecordIdList:
          type: array
          items:
            type: string
          minItems: 1

    RecordDeleteResponse:
      description: Response to record deletion
      allOf:
        - $ref: '#/components/schemas/RecordIdList'
        - $ref: '#/components/schemas/FailedRecordIdList'

    Block:
      description: A Block can be of any type
      example: >-
        "QmxvY2sgY29udGVudA=="
    NotificationSubscription:
      description: Definition of a notification subscription
      type: object
      properties:
        clientId:
          $ref: '#/components/schemas/ClientId'
        callbackReference:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
        expiryCallbackReference:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
        expiry:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/DateTime'
        expiryNotification:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        subFilter:
          $ref: '#/components/schemas/SubscriptionFilter'
        supportedFeatures:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - clientId
        - callbackReference

    RecordNotification:
      description: Definition of a notification on a record
      type: object
      properties:
        descriptor:
          # json representation of the notification description
          $ref: '#/components/schemas/NotificationDescription'
        meta:
          # json representation of the Meta Data
          $ref: '#/components/schemas/RecordMeta'
        blocks:
          # List of multipart data
          type: array
          description: list of opaque Block's in this Record
          items:
            $ref: '#/components/schemas/Block'
      required:
        - descriptor
        - meta
      example: >-
        {"descriptor": { "recordRef" : "...", "operationType" : "DELETED"}, "meta": { "tags" : {"tag1" : ["value1"], "tag2" :["value2"] } }, "blocks": [{"Content-Id": "userDefBinaryBlob", "Content-Type": "text/plain", "content": "QmxvY2sgY29udGVudA=="}, {"Content-Id": "userDefJsonBlob", "Content-Type": "application/json", "content": "{"key": "ftsimpletype-999550000000002", "value": "A3E71A78377179B5B91A;imsi-999550000000123"}]}

    NotificationDescription:
      description: Description of a record notification
      type: object
      properties:
        recordRef:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
        operationType:
          $ref: '#/components/schemas/RecordOperation'
        subscriptionId:
          # unique identifier of the NotificationSubscription
          type: string
      required:
        - recordRef
        - operationType
      example: >-
        { "record" : "...", "operationType" : "DELETED"}

    SubscriptionFilter:
      description: A subscription filter
      type: object
      properties:
        monitoredResourceUris:
          type: array
          description: list of resources applicable to the subscription
          items:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
          minItems: 1
        operations:
          type: array
          description: list of resources applicable to the subscription
          items:
            $ref: '#/components/schemas/RecordOperation'
          maxItems: 3

    ClientId:
      description: Defines the identity of the NF Consumer
      type: object
      properties:
        nfId:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/NfInstanceId'
        nfSetId:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/NfSetId'

    RecordOperation:
      description: Indicate operation made on a record
#      anyOf:
#      - type: string
      type: string
      enum:
        - CREATED
        - UPDATED
        - DELETED
#      - type: string
#
    ConditionOperator:
      description: TBD
#      anyOf:
#      - type: string
      type: string
      enum:
        - AND
        - OR
        - NOT
#      - type: string
#
    ComparisonOperator:
      description: TBD
#      anyOf:
#        - type: string
      type: string
      enum:
        # Equals
        - EQ
        # Not Equal
        - NEQ
        # Greater Than
        - GT
        # Greater Than or Equal
        - GTE
        # Less Than
        - LT
        # Less Than or Equal
        - LTE
#        - type: string
#
    CountExpression:
      description: >
        A map containing parameters for advanced counting feature with unique key for each request
      type: object
      properties:
        tag:
          type: string
        countType:
          $ref: '#/components/schemas/TagCountType'
        filter:
          $ref: '#/components/schemas/SearchExpression'
      required:
        - countType
      example:
        {"advancedTagCount1":{"tag" : "tag1", countType : UNIQUE_COUNT , "filter" : NULL}, "advancedTagCount2":{"tag" : "tag2", countType : AGGREGATE_COUNT, "filter" : NULL}}

    TagCountType:
      description: Indicate mode of tag count operations
#      anyOf:
#      - type: string
      type: string
      enum:
        - UNIQUE_COUNT
        - AGGREGATE_COUNT
        - TOTAL_COUNT
#      - type: string
#
    TagCount:
      description: The TagCount result of a_Advanced Count request
      type: object
      properties:
        tag:
          type: string
        count:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        valueCount:
          type: array
          items:
            $ref: '#/components/schemas/ValueCount'

    ValueCount:
      description: The AggregateCount map
      type: object
      properties:
        value:
          type: string
        count:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'

    SearchExpression:
      description: A logical expression element
      type: object
      oneOf:
        - $ref: '#/components/schemas/SearchCondition'
        - $ref: '#/components/schemas/SearchComparison'
        - $ref: '#/components/schemas/RecordIdList'
      example:
        { "cond": "OR", "units": [ { "op": "EQ", "tag" : "ueId", "value" : "455345" }, { "op": "EQ", "tag" : "supi", "value" : "imsi-999559807001001" } ] }

    SearchCondition:
      description: A logical condition
      type: object
      properties:
        cond:
          $ref: '#/components/schemas/ConditionOperator'
        units:
          type: array
          items:
            $ref: '#/components/schemas/SearchExpression'
          minItems: 1
        schemaId:
          $ref: '#/components/schemas/SchemaId'
      required:
        - cond
        - units
      example:
        { "cond": "OR", "units": [ { "op": "EQ", "tag" : "ueId", "value" : "455345" }, { "op": "EQ", "tag" : "supi", "value" : "imsi-999559807001001" } ] }

    SearchComparison:
      description: A comparison to apply on tag/values pairs.
      type: object
      properties:
        op:
          $ref: '#/components/schemas/ComparisonOperator'
        tag:
          type: string
        value:
          type: string
      required:
        - op
        - tag
        - value
      example:
        { "op": "EQ", "tag" : "supi", "value" : "imsi-999559807001001" }

    MetaSchema:
      description: Defines the Meta Schema
      type: object
      required:
        - schemaId
        - metaTags
      properties:
        schemaId:
          $ref: '#/components/schemas/SchemaId'
        metaTags:
          type: array
          items:
            $ref: '#/components/schemas/TagType'

    TagType:
      description: Defines the Tag Type
      type: object
      required:
        - tagName
        - keyType
      properties:
        tagName:
          type: string
        keyType:
          $ref: '#/components/schemas/KeyType'
        sort:
          type: boolean
          default: false
        presence:
          type: boolean

    SchemaId:
      description: Represents the Identifier of a Meta schema.
      type: string

    KeyType:
      description: Represents the type of a key.
#      anyOf:
#        - type: string
      type: string
      enum:
      - UNIQUE_KEY
      - SEARCH_KEY
      - COUNT_KEY
      - SEARCH_AND_COUNT_KEY
      - OTHER_TAG
#        - type: string
#
    RetrieveRecords:
      description: Indicates the data to be retrieved.
#      anyOf:
#        - type: string
      type: string
      enum:
      - ONLY_META
      - META_AND_BLOCKS
#        - type: string
#
    NotificationInfo:
      type: object
      required:
        - expiredSubscriptions
      properties:
        expiredSubscriptions:
          type: array
          items:
            $ref: '#/components/schemas/NotificationSubscription'
          minItems: 1

    ExtendedProblemDetails:
      description: Extending problemDetails
      allOf:
        - $ref: 'TS29571_CommonData.yaml#/components/schemas/ProblemDetails'
        - $ref: '#/components/schemas/ProblemDetailsExtension'

    ProblemDetailsExtension:
      anyOf:
        - $ref: '#/components/schemas/Record'
        - $ref: '#/components/schemas/RecordMeta'

  headers:
    Cache-Control:
      description: Cache-Control containing max-age, as described in RFC 9111, 5.2
      schema:
        type: string
    ETag:
      description: Entity Tag, containing a strong validator, as described in RFC 9110, 8.8.3
      schema:
        type: string
    Last-Modified:
      description: Timestamp for last modification of the resource, as described in RFC 9110, 8.8.2
      schema:
        type: string
    Location:
      description: Contains the URI of the newly created resource
      required: true
      schema:
        type: string
    Retry-After:
      description: >
        'Indicates the time the NF Consumer has to wait before making a new request.
        It can be a non-negative integer (decimal number) indicating the number of
        seconds the NF Consumer has to wait before making a new request or an
        HTTP-date after which the AF can retry a new request.'
      schema:
        anyOf:
          - type: integer
          - type: string

  requestBodies:
    RecordBody:
      description: >
        The record multipart request body. The meta part shall be the first part
        and is mandatory but can be empty and zero or more block parts may follow the meta part.
      required: true
      content:
        multipart/mixed:
          schema:
            $ref: '#/components/schemas/Record'
          encoding:
            meta: # The meta part shall be the first part and is mandatory but can be empty
              contentType: application/json
              headers:
                Content-Id:
                  schema:
                    type: string
                  required: true
            blocks: # 0 or more block parts may follow the meta part
              contentType: '*/*' # Block part can be of any type
              headers:
                Content-Id: # Block identifier is defined by the Content-Id header.
                  schema:
                    type: string
                  required: true
                Content-Transfer-Encoding:
                  schema:
                    type: string
                  required: true

    RecordPatchBody:
      description: >
        The patch record multipart request body. The patch part shall be the first part
        and is mandatory and zero or more block parts being referred to by patch items
        may follow the patch part.
      required: true
      content:
        multipart/mixed:
          schema:
            $ref: '#/components/schemas/RecordPatch'
          encoding:
            patch: # The patch part shall be the first part
              contentType: application/json-patch+json
              headers:
                Content-Id:
                  schema:
                    type: string
                  required: true
            blocks: # 0 or more block parts may follow the patch part
              contentType: '*/*' # Block part can be of any type
              headers:
                Content-Id: # Block identifier is defined by the Content-Id header.
                  schema:
                    type: string
                  required: true
                Content-Transfer-Encoding:
                  schema:
                    type: string
                  required: true

    RecordNotificationBody:
      description: >
        The record notification multipart request body. The descriptor part shall be the
        first one, followed by record meta part and by zero or more block parts.
      required: true
      content:
        multipart/mixed:
          schema:
            $ref: '#/components/schemas/RecordNotification'
          encoding:
            descriptor: # The descriptor part shall be the first part and is mandatory
              contentType: application/json
              headers:
                Content-Id:
                  schema:
                    type: string
                  required: true
            meta: # The meta part shall be the second part and is mandatory but can be empty
              contentType: application/json
              headers:
                Content-Id:
                  schema:
                    type: string
                  required: true
            blocks: # 0 or more block parts may follow the meta part
              contentType: '*/*' # Block part can be of any type
              headers:
                Content-Id: # Block identifier is defined by the Content-Id header.
                  schema:
                    type: string
                  required: true
                Content-Transfer-Encoding:
                  schema:
                    type: string
                  required: true

  responses:
    '304': # Etag response if the value might differ from that sent
      description: Not Modified
      content:
        application/problem+json:
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/ProblemDetails'
      headers:
        Cache-Control:
          $ref: '#/components/headers/Cache-Control'
        ETag:
          $ref: '#/components/headers/ETag'
        Retry-After:
          $ref: '#/components/headers/Retry-After'

    'RecordBody': #  Record value with associated headers
      description: >
        - 200 Update. The resource has been successfully updated and previous value
          must be sent in the response message if requested.
        - 200 Get. The resource exists, its value must be sent in the response message
        - 412 Precondition Failed, the previous value must be sent in response message if requested.
      content:
        multipart/mixed:
          schema:
            $ref: '#/components/schemas/Record'
          encoding:
              meta: # The meta part shall be the first part and is mandatory but can be empty.
                contentType: application/json
                headers:
                  Content-Id: # The meta part is identified by the 'meta' Content-Id header.
                    schema:
                      type: string
                    required: true
              blocks: # Zero or more block parts may follow the meta part
                contentType: '*/*' # Block parts can be of any type.
                headers:
                  Content-Id: # Block identifier is defined by the Content-Id header.
                    schema:
                      type: string
                    required: true
                  Content-Transfer-Encoding:
                    schema:
                      type: string
                    required: true
      headers:
        Cache-Control:
          $ref: '#/components/headers/Cache-Control'
        ETag:
          $ref: '#/components/headers/ETag'
        Last-Modified:
          $ref: '#/components/headers/Last-Modified'

    'RecordBodyDelete': #  Record value with associated headers
      description: >
        - 200 Delete. The resource has been successfully delete and previous value
          must be sent in the response message if requested.
      content:
        multipart/mixed:
          schema:
            $ref: '#/components/schemas/Record'
          encoding:
              meta: # The meta part shall be the first par and is mandatory but can be empty.
                contentType: application/json
                headers:
                  Content-Id: # The meta part is identified by the Content-Id header.
                    schema:
                      type: string
                    required: true
              blocks: # Zero or more block parts may follow the meta part.
                contentType: '*/*' # Block parts can be of any type.
                headers:
                  Content-Id: # Block identifier is defined by the Content-Id header.
                    schema:
                      type: string
                    required: true
                  Content-Transfer-Encoding:
                    schema:
                      type: string
                    required: true
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
        Last-Modified:
          $ref: '#/components/headers/Last-Modified'

    'BlockBody': #  Block value with associated headers
      description: >
        - 200 Update: The resource has been successfully updated and previous value
          must be sent in the response message if requested.
        - 200 Get: The resource exists, its value must be sent in the response message
        - 412 Precondition Failed: the previous value must be sent in response message if requested.
      content:
        '*/*':
          schema:
              $ref: '#/components/schemas/Block'
      headers:
        Cache-Control:
          $ref: '#/components/headers/Cache-Control'
        ETag:
          $ref: '#/components/headers/ETag'
        Last-Modified:
          $ref: '#/components/headers/Last-Modified'

    'BlockBodyDelete': #  Block value with associated headers
      description: >
        - 200 Delete: The resource has been successfully delete and previous value
          must be sent in the response message if requested.
      content:
        '*/*':
          schema:
              $ref: '#/components/schemas/Block'
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
        Last-Modified:
          $ref: '#/components/headers/Last-Modified'
    'RecordSearchResultBody': # The record search result or multipart search/retrieve result response body
      description: >-
          - 200 Get. Records matching the search exist. The response shall include either a recordSearchResultDescriptor or a recordSearchResultDescriptor part followed by parts for the meta and blocks of all matching Records. 
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RecordSearchResultDescriptor'
        multipart/mixed:
          schema:
            $ref: '#/components/schemas/RecordSearchResult'
          encoding:
            descriptor: # The descriptor part shall be the first part and is mandatory
              contentType: application/json
              headers:
                Content-Id:
                  schema:
                    type: string
                  required: true
            meta: # 0 or more meta parts may follow the descriptor part
              contentType: application/json
              headers:
                Content-Id:
                  schema:
                    type: string
                  required: true
            blocks: # 0 or more block parts may follow each meta part
              contentType: '*/*' # Block part can be of any type
              headers:
                Content-Id: # Block identifier is defined by the Content-Id header.
                  schema:
                    type: string
                  required: true
                Content-Transfer-Encoding:
                  schema:
                    type: string
                  required: true

    '409':
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ExtendedProblemDetails'
    '412':
      description: Precondition Failed
      headers:
        ETag:
          $ref: '#/components/headers/ETag'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ExtendedProblemDetails'
    '500':
      description: Internal Server Error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ExtendedProblemDetails'

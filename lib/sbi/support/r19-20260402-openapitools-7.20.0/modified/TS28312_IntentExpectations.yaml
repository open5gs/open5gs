      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - NfType
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          uniqueItems: true
          items:
            $ref: 'TS28541_5GcNrm.yaml#/components/schemas/NFType'
    NfInstanceLocationContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for NfInstanceLocationContext 
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - NfInstanceLocation
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          uniqueItems: true
          items:
            type: string
    TaiContext: 
      description: >-
        This data type is the "ObjectContext" data type with specialisations for TaiContext
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - Tai
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          uniqueItems: true
          items:
            $ref: 'TS28623_GenericNrm.yaml#/components/schemas/Tai'
    ServingScopeContext:          
      description: >-
        This data type is the "ObjectContext" data type with specialisations for ServingScopeContext   
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - ServingScope
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          uniqueItems: true
          items:
            type: string
    DnnContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for DnnContext   
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - Dnn
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          uniqueItems: true
          items:
            type: string
    MaintenanceVersionContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for MaintenanceVersionContext. It describes the scope of the maintenance objects based on software version.
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - swVersion
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          items:
            type: string
    MaintenanceOrderContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for MaintenanceOrderContext. It describes describes the list of DNs for NFs/NEs based on their order for maintenance.
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - maintenanceOrder
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          items:
            type: string
    MaintenanceTypeContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for MaintenanceTypeContext. It describes the type of maintenance expected for the maintenance object.
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - maintenanceType
        contextCondition:
          type: string
          enum:
            - IS_EQUAL_TO
        contextValueRange:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
              - UPGRADE
              - DOWNGRADE

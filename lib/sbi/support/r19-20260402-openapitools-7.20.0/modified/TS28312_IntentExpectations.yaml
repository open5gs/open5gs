   #-------Definition of the concrete ObjectTarget dataType----------------#
    CoverageAreaPolygonContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for CoverageAreaPolygonContext.It describes the coverage areas for the RAN SubNetwork that the
        intent expectation is applied in the form of polygon.
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - CoverageAreaPolygon
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/GeoArea'
    CoverageTACContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for CoverageTACContext.It describes the coverage areas for the RAN SubNetwork that the intent
        expectation is applied in the form of TAC.     
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - CoverageAreaTac
        contextCondition:
          type: string
          enum:
             - IS_ALL_OF
        contextValueRange:
          type: array
          uniqueItems: true
          items:
            $ref: "TS28623_ComDefs.yaml#/components/schemas/Tac"
    CellContext:
      description: >-
        This data type is the "ObjectContext" data type with specialisations for CellContext.
        It describes the coverage areas for the RAN SubNetwork or Radio Service that the intent expectation is applied
        in the form of a list of cells (including E-UTRAN cells identified by E-UTRAN-CGI and NR cells
        identified by NG-RAN CGI).
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - Cell
        contextCondition:
          type: string
          enum:
             - IS_ALL_OF
        contextValueRange:
          type: array
          items:
            $ref: "#/components/schemas/CellId"
    CellId:
      oneOf:
        - $ref: 'TS28623_ComDefs.yaml#/components/schemas/EutraCellId'
        - $ref: 'TS28623_ComDefs.yaml#/components/schemas/NrCellId'
    TimeBasedAreaContext:
      description: >- 
        This data type is the "ObjectContext" data type with specialisations for TimeBasedAreaContext. 
        It describes the areas for specific times for the RAN SubNetwork that the intent expectation is 
        applied in the form of a <GeoArea, TimeWindow> list.
      type: object
      properties:
        contextAttribute:
          type: string
          enum:
            - TimeBasedArea
        contextCondition:
          type: string
          enum:
            - IS_ALL_OF
        contextValueRange:
          type: array
          items:
            $ref: "#/components/schemas/TimeBasedArea"

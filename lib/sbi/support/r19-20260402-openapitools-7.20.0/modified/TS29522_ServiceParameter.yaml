    EventInfo:
      description: Indicates the event information.
      type: object
      properties:
        failureCause:
          $ref: '#/components/schemas/Failure'
        plmnId:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/PlmnIdNid'

    DetailedEventInfo:
      description: >
        Detailed information about the delivery outcome of service parameter provisioning requests.
      type: object
      properties:
        uePolEventInfos:
          type: array
          items:
            $ref: '#/components/schemas/UePolEventInfo'
          minItems: 1
          description: contains the UE policy event information.
        gpsi:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Gpsi'
      required:
        - uePolEventInfos
        - gpsi

    UePolEventInfo:
      description: >
        Event information about the outcome of Service Parameter provisioning requests for the UE
        policy delivery.
      type: object
      properties:
        policyType:
          $ref: '#/components/schemas/UePolPartType'
        outcome:
          $ref: '#/components/schemas/Outcome'
        afReqUrspIds:
          type: array
          items:
            type: string
          minItems: 1
          description: >
            Contains the Unsuccessfully delivery URSP rule Ids that related to the AF provided
            Service parameter provisioning.
      required:
        - policyType

    Failure:
#      anyOf:
#      - type: string
      type: string
      enum:
        - UNSPECIFIED
        - UE_NOT_REACHABLE
        - UNKNOWN
        - UE_TEMP_UNREACHABLE
        - DNN_NOT_ALLOWED
        - SNSSAI_NOT_ALLOWED
#      - type: string
#        description: >
#          This string provides forward-compatibility with future extensions to the enumeration
#          and is not used to encode content defined in the present version of this API.
#      description: |
#        Represents the failure reason for the unsuccessful result.  
#        Possible values are:
#        - UNSPECIFIED: Indicates the PCF received the UE sent UE policy delivery service cause #111
#          (Protocol error, unspecified) or that the PCF does not authorize the service information
#          for unspecified reasons.
#        - UE_NOT_REACHABLE: Indicates the PCF received the notification from the AMF that the UE is
#          not reachable.
#        - UNKNOWN: Indicates unknown reasons upon no response from the UE, e.g. UPDS message type is
#          not defined or not implemented by the UE, or not compatible with the UPDS state, in which
#          the UE shall ignore the UPDS message.
#        - UE_TEMP_UNREACHABLE: Indicates the PCF received the notification from the AMF that the UE
#          is not reachable but the PCF will retry again. 
#        - DNN_NOT ALLOWED: Indicates that the DNN is not authorized for the user.
#        - SNSSAI_NOT_ALLOWED: Indicates that the SNSSAI is not authorized for the user.

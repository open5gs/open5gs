          type: integer
          minimum: 0
          maximum: 4294967295
          format: int64
        ngeNbId:
          type: string
          pattern: '^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$'
        wagfId:
          type: string
          pattern: '^[A-Fa-f0-9]+$'
        tngfId:
          type: string
          pattern: '^[A-Fa-f0-9]+$'
        twifId:
          type: string

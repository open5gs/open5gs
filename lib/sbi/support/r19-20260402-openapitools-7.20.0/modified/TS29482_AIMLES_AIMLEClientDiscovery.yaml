openapi: 3.0.0

info:
  title: AIMLES_AIMLEClientDiscovery
  version: 1.0.1
  description: |
    API for AIMLES Client Discovery Service.  
    © 2026, 3GPP Organizational Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).   
    All rights reserved.

externalDocs:
  description: >
    3GPP TS 29.482 v19.1.0; Artificial Intelligence Machine Learning Enablement 
    (AIMLE) Services; Stage 3.
  url: https://www.3gpp.org/ftp/Specs/archive/29_series/29.482/

servers:
  - url: '{apiRoot}/aimles-disc/v1'
    variables:
      apiRoot:
        default: https://example.com
        description: apiRoot as defined in clause 6.5 of 3GPP TS 29.549

security:
  - {}
  - oAuth2ClientCredentials: []

paths:
  /clients:
    get:
      summary: Retrieve an existing the Individual AIMLE Data Management Assistance Subscription resource.
      operationId: GetAimleClients
      tags:
        - AIMLE Clients (Collection)
      parameters:
        - name: filt-criteria
          in: query
          description: >
             Represents the AIMLE Client(s) filtering criteria.
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDiscCriteria'
        - name: cl-number
          in: query
          description: >
            Represents the required number of the discovered AIMLE Clients.
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        - name: supported-features
          in: query
          description: >
            Contains supported features information, used to negotiate the applicability
            of optional features.
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      responses:
        '200':
          description: >
            OK. The response body contains the result of the search over the list of AIMLE Clients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDiscResp'
        '307':
          $ref: 'TS29122_CommonData.yaml#/components/responses/307'
        '308':
          $ref: 'TS29122_CommonData.yaml#/components/responses/308'
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '406':
          $ref: 'TS29122_CommonData.yaml#/components/responses/406'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

components:
  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: '{tokenUrl}'
          scopes: {}

  schemas:
    ClientDiscCriteria:
      description: Represents the AIMLE Client discovery criteria.
      type: object
      properties:
        serviceReq:
          $ref: '#/components/schemas/ServiceRequirement'
        mlModelTypes:
          type: array
          items:
            $ref: '#/components/schemas/MlModelType'
          minItems: 1
        aimlOpers:
          type: array
          items:
            $ref: '#/components/schemas/AimlOperationRole'
          minItems: 1
        clientAppCap:
          $ref: '#/components/schemas/ClientAppCapability'
        datasetReq:
          $ref: '#/components/schemas/DatasetRequirement'
        clientTaskCap:
          $ref: '#/components/schemas/ClientTaskCapability'
        clientVel:
          $ref: '#/components/schemas/ClientVelocity'
        location:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/LocationArea5G'
        clientQosReqs:
          type: array
          items:
            $ref: 'TS29548_SDD_TransmissionQualityMeasurement.yaml#/components/schemas/TransQualMeasCriteriaSet'
          minItems: 1
      required:
        - serviceReq
        - aimlOpers
        - clientAppCap

    ServiceRequirement:
      description: Represents the AIMLE service requirements.
      type: object
      properties:
        valServId:
          type: string
        permLevel:
          $ref: '#/components/schemas/ServicePermLevel'
      required:
        - valServId

    ClientAppCapability:
      description: Represents the AIMLE Client compute capability type.
      type: object
      properties:
        appType:
          $ref: '#/components/schemas/MlAppType'
        avail:
          type: array
          items:
            $ref: 'TS29122_CpProvisioning.yaml#/components/schemas/ScheduledCommunicationTime'
          minItems: 1
        dropOfRate:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - appType

    DatasetRequirement:
      description: Represents the dataset requirements.
      type: object
      properties:
        avail:
          $ref: '#/components/schemas/DatasetAvailability'
        cap:
          $ref: '#/components/schemas/DatasetCapability'

    DatasetAvailability:
      description: Represents the dataset availability information.
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
          minItems: 1
        age:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DateTime'
        size:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        features:
          type: array
          items:
            type: string
          minItems: 1

    DatasetCapability:
      description: Represents the dataset capability information.
      type: object
      properties:
        dataType:
          $ref: '#/components/schemas/DataType'
        functions:
          type: array
          items:
            type: string
          minItems: 1

    ClientTaskCapability:
      description: Represents the performance capabilities.
      type: object
      properties:
        compCap:
          $ref: '#/components/schemas/ComputeCapability'
        perfCap:
          $ref: '#/components/schemas/PerformanceCapability'

    ClientDiscResp:
      description: Represents the AIMLE Client discovery response.
      type: object
      properties:
        clients:
          type: array
          items:
            $ref: 'TS29482_AIMLES_ContextTransfer.yaml#/components/schemas/AimleClientId'
          minItems: 0
        suppTasks:
          type: array
          items:
            $ref: '#/components/schemas/ClientTaskCapability'
          minItems: 1
        suppFeats:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - clients



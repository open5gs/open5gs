openapi: 3.0.0

info:
  title: Aimlec_HFLTraining
  version: 1.0.2
  description: |
    API for Horizontal Federated Learning (HFL) training Service.  
    © 2026, 3GPP Organizational Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).  
    All rights reserved.

externalDocs:
  description: >
    3GPP TS 24.560 V19.1.0; Artificial Intelligence / Machine Learning (AIML) Services – Service
    Enabler Architecture Layer for Verticals (SEAL); Protocol Specification; Stage 3.
  url: 'https://www.3gpp.org/ftp/Specs/archive/24_series/24.560/'

servers:
  - url: '{apiRoot}/aimlec-hfl-trng/v1'
    variables:
      apiRoot:
        default: https://example.com
        description: apiRoot as defined in clause 5.2.4 of 3GPP TS 29.122.

security:
  - {}
  - oAuth2ClientCredentials: []

paths:
  /subscriptions:
    post:
      summary: >
        Used by AIMLE server to subscribe with the AIMLE client for HFL training event.
      operationId: HFLTraningSubs
      tags:
        - HFL training service API event subscriptions (Collection)
      requestBody:
        description: Contains information for HFL training subscription.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HflTrngSub'
      responses:
        '201':
          description: Created. Service API event subscription resource created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HflTrngSub'
          headers:
            Location:
              description: Contains the URI of the newly created resource.
              required: true
              schema:
                type: string
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '411':
          $ref: 'TS29122_CommonData.yaml#/components/responses/411'
        '413':
          $ref: 'TS29122_CommonData.yaml#/components/responses/413'
        '415':
          $ref: 'TS29122_CommonData.yaml#/components/responses/415'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'
      callbacks:
        notifUri:
          '{$request.body#/notifUri}':
            post:
              requestBody:  # contents of the callback message
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/HflTrngNotify'
              responses:
                '204':
                  description: No Content (successful notification)
                '307':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/307'
                '308':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/308'
                '400':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/400'
                '411':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/411'
                '413':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/413'
                '415':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/415'
                '429':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/429'
                '500':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/500'
                '503':
                  $ref: 'TS29122_CommonData.yaml#/components/responses/503'
                default:
                  $ref: 'TS29122_CommonData.yaml#/components/responses/default'

  /subscriptions/{subscriptionId}:
    parameters:
      - name: subscriptionId
        in: path
        description: Identifier of the individual Events Subscription.
        required: true
        schema:
          type: string
    get:
      description: Retrieve an existing "Individual HFL training subscription" resource.
      operationId: RetrieveHFLTraningSubs
      tags:
        - Individual HFL training Subscription (Document)
      responses:
        '200':
          description: The individual HFL training subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HflTrngSub'
        '307':
          $ref: 'TS29122_CommonData.yaml#/components/responses/307'
        '308':
          $ref: 'TS29122_CommonData.yaml#/components/responses/308'
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '406':
          $ref: 'TS29122_CommonData.yaml#/components/responses/406'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

    put:
      description: >
        Update the "Individual HFL training subscription" resource.
      operationId: UpdateHFLTrainingSubs
      tags:
        - Individual HFL training subscription (Document)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HflTrngSub'
      responses:
        '200':
          description: >
            OK. Individual HFL training subscription resource is successfully updated,
            and representation of updated resource is returned in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HflTrngSub'
        '204':
          description: >
            No Content. Individual HFL training subscription resource is successfully updated,
            and no content is returned in the response body.
        '307':
          $ref: 'TS29122_CommonData.yaml#/components/responses/307'
        '308':
          $ref: 'TS29122_CommonData.yaml#/components/responses/308'
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '411':
          $ref: 'TS29122_CommonData.yaml#/components/responses/411'
        '413':
          $ref: 'TS29122_CommonData.yaml#/components/responses/413'
        '415':
          $ref: 'TS29122_CommonData.yaml#/components/responses/415'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

    patch:
      description: >
        Modify the "Individual HFL training subscription" resource.
      operationId: ModifyHFLTrainingSubs
      tags:
        - Individual HFL training subscription (Document)
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/HflTrngSubPatch'
      responses:
        '200':
          description: >
            OK. The Individual HFL training subscription resource is successfully modified,
            and representation of the modified resource is returned in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HflTrngSub'
        '204':
          description: >
            No Content. The Individual HFL training subscription resource is successfully modified,
            and no content is returned in the response body.
        '307':
          $ref: 'TS29122_CommonData.yaml#/components/responses/307'
        '308':
          $ref: 'TS29122_CommonData.yaml#/components/responses/308'
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '411':
          $ref: 'TS29122_CommonData.yaml#/components/responses/411'
        '413':
          $ref: 'TS29122_CommonData.yaml#/components/responses/413'
        '415':
          $ref: 'TS29122_CommonData.yaml#/components/responses/415'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

    delete:
      description: Deletes an individual HFL training subscription.
      operationId: DeleteHFLTraningSubs
      tags:
        - Individual HFL training Subscription (Document)
      responses:
        '204':
          description: >
            The individual HFL training Subscription matching the subscriptionId is deleted.
        '307':
          $ref: 'TS29122_CommonData.yaml#/components/responses/307'
        '308':
          $ref: 'TS29122_CommonData.yaml#/components/responses/308'
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

components:

  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: '{tokenUrl}'
          scopes: {}

  schemas:

#
# STRUCTURED DATA TYPES
#

    HflTrngSub:
      description: Represents data type for HFL training subscription and its update.
      type: object
      required:
      - requesterId
      - notifUri
      - aimlMdlInfo
      - dataId
      - noDataSamp
      - vaSrvId
      properties:
        requesterId:
          description: Represents the requester identity.
          type: string
        notifUri:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/Uri'
        aimlMdlInfo:
          $ref: 'TS29482_AIMLES_MLModelTraining.yaml#/components/schemas/MlModelInfo'
        dataId:
          description: Identifies the dataset which is to be used for the HFL training.
          type: string
        noDataSamp:
          description: Identifies the required number of samples for a round of the HFL training.
          type: integer
        operSched:
          $ref: 'TS29122_CpProvisioning.yaml#/components/schemas/ScheduledCommunicationTime'
        notifReqs:
          $ref: 'TS29549_SS_NetworkResourceMonitoring.yaml#/components/schemas/ReportingRequirements'
        suppFeat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
        vaSrvId:
          description: Identifies the VAL service for the AIMLE HFL training operation.
          type: string
        subId:
          description: Identifies the subscription.
          type: string

    HflTrngSubPatch:
      description: Represents data type for partial update of the HFL training subscription.
      type: object
      properties:
        notifUri:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/Uri'
        aimlMdlInfo:
          $ref: 'TS29482_AIMLES_MLModelTraining.yaml#/components/schemas/MlModelInfo'
        dataId:
          description: Identifies the dataset which is to be used for the HFL training.
          type: string
        noDataSamp:
          description: Identifies the required number of samples for a round of the HFL training.
          type: integer
        operSched:
          $ref: 'TS29122_CpProvisioning.yaml#/components/schemas/ScheduledCommunicationTime'
        notifReqs:
          $ref: 'TS29549_SS_NetworkResourceMonitoring.yaml#/components/schemas/ReportingRequirements'

    HflTrngNotify:
      description: Represent the information from the HFL training event notification.
      type: object
      required:
      - hflTrngOut
      - vaSrvId
      properties:
        vaSrvId:
          description: Identifies the VAL service for the AIMLE HFL training operation.
          type: string
        hflTrngOut:
          $ref: 'TS29482_AIMLES_MLModelTraining.yaml#/components/schemas/PerfParams'
        hflTrngErr:
          $ref: 'TS29482_AIMLES_MLModelTraining.yaml#/components/schemas/TrainingErr'
        timestamp:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DateTime'

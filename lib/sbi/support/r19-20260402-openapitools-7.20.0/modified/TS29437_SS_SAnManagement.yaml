components:
  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "{tokenUrl}"
          scopes: {}

  schemas:

#
# STRUCTURED DATA TYPES
#

    SpatialAnchorsList:
      description: >
        Represents the Spatial Anchors List.
      type: object
      properties:
        valServInfo:
          $ref: '#/components/schemas/VALServiceInfo'
        anchors:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SpatialAnchor'
          minProperties: 1
        suppFeat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - valServInfo
        - anchors

    SpatialAnchorsListPatch:
      description: >
        Represents the patch of Spatial Anchors List.
      type: object
      properties:
        valServInfo:
          $ref: '#/components/schemas/VALServiceInfo'
        anchors:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SpatialAnchorRm'
          minProperties: 1

    VALServiceInfo:
      description: >
        Represents the VAL service information.
      type: object
      properties:
        serviceId:
          type: string
        endPt:
          $ref: 'TS29548_SDD_Transmission.yaml#/components/schemas/ConnInfo'
        servConInfo:
          $ref: "#/components/schemas/ServConnectInfo"
      required:
        - serviceId
        - endPt

    ServConnectInfo:
      description: >
        Represents the connectivity information related to the application service.
      type: object
      properties:
        dnais:
           type: array
           items:
             $ref: 'TS29571_CommonData.yaml#/components/schemas/Dnai'
           minItems: 1
        dnn:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Dnn'
      anyOf:
        - required: [dnais]
        - required: [dnn]

    SpatialAnchor:
      description: >
        Represents the Spatial Anchor profile information.
      type: object
      properties:
        anchorId:
          $ref: '#/components/schemas/SpatialAnchorId'
        posInfo:
          $ref: '#/components/schemas/PositionInfo'
        specInfo:
           $ref: 'TS29122_CommonData.yaml#/components/schemas/Bytes'
        svcArea:
           $ref: 'TS29558_Eecs_EESRegistration.yaml#/components/schemas/ServiceArea'
        rules:
          $ref: '#/components/schemas/AllowedRules'
      required:
        - posInfo

    SpatialAnchorRm:
      description: >
        Represents the Spatial Anchor profile information.
      type: object
      properties:
        anchorId:
          $ref: '#/components/schemas/SpatialAnchorId'
        posInfo:
          $ref: '#/components/schemas/PositionInfo'
        specInfo:
           $ref: 'TS29122_CommonData.yaml#/components/schemas/Bytes'
        svcArea:
           $ref: 'TS29558_Eecs_EESRegistration.yaml#/components/schemas/ServiceArea'
        rules:
          $ref: '#/components/schemas/AllowedRules'
      required:
        - posInfo
      nullable: true

    AllowedRules:
      description: >
        Represents the access control rules.
      type: object
      properties:
        allowedEntities:
          type: array
          items:
            $ref: '#/components/schemas/AllowedEntity'
          minItems: 1
        valServiceList:
          type: array
          items:
            type: string
          minItems: 1
      anyOf:
        - required: [allowedEntities]
        - required: [valServiceList]

    AllowedEntity:
      description: >
        Represents the allowed application entity.
      type: object
      properties:
        type:
          $ref: '#/components/schemas/EntityType'
        identifier:
          type: string
      anyOf:
        - required: [type]
        - required: [identifier]

    PositionInfo:
      description: >
        Represents the positioning information of the Spatial Anchor and the related Spatial Map.
      type: object
      properties:
        pos:
          $ref: 'TS29572_Nlmf_Location.yaml#/components/schemas/Local3dPointUncertaintyEllipsoid'
        spaMapPos:
          $ref: '#/components/schemas/SpatialAnchorMapPosition'
      anyOf:
        - required: [pos]
        - required: [spaMapPos]

    SpatialAnchorMapPosition:
      description: >
        Represents the Spatial map positioning of the Spatial Anchor.
      type: object
      properties:
        spaMapId:
          type: string
          description: Contains the Spatial Map Identifier.
        spaMapLayerId:
          type: array
          items:
            type: string
          minItems: 1
          description: Contains the identifier(s) of Spatial Map layer(s).
        localInfo:
          $ref: '#/components/schemas/LocalizationInfo'
      required:
        - spaMapId

    LocalizationInfo:
      description: >
        Represents the localization information of the Spatial Anchor.
      type: object
      properties:
        localInfo:
          type: string
          description: Contains the localization information.

    SpatialAnchorsSub:
      description: >
        Represents the Spatial Anchors subscription.
      type: object
      properties:
        eventSubs:
          type: array
          items:
            $ref: '#/components/schemas/AnchorsEventsSub'
          minItems: 1
        notifUri:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/Uri'
        report:
          $ref: '#/components/schemas/SpatialAnchorsNotif'
        reportReq:
          $ref: 'TS29523_Npcf_EventExposure.yaml#/components/schemas/ReportingInformation'
        expTime:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DateTime'
        suppFeat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - eventSubs
        - notifUri

    SpatialAnchorsSubPatch:
      description: >
        Represents the partial Spatial Anchors subscription.
      type: object
      properties:
        eventSubs:
          type: array
          items:
            $ref: '#/components/schemas/AnchorsEventsSub'
          minItems: 1
        notifUri:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/Uri'
        reportReq:
          $ref: 'TS29523_Npcf_EventExposure.yaml#/components/schemas/ReportingInformation'
        expTime:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DateTime'

    SpatialAnchorsNotif:
      description: >
        Represents the Spatial Anchors Notification.
      type: object
      properties:
        subId:
          type: string
        reports:
          type: array
          items:
            $ref: '#/components/schemas/AnchorsReport'
          minItems: 1
      required:
        - subId
        - reports

    AnchorsReport:
      description: >
        Represents the Spatial Anchors report.
      type: object
      properties:
        event:
          $ref: '#/components/schemas/AnchorEvent' 
        detEvent:
          $ref: '#/components/schemas/DetectedEvent'
        achrList:
          type: array
          items:
            $ref: '#/components/schemas/SpatialAnchorProfile'
          minItems: 1
        ueAnchrInt:
          type: array
          items:
            $ref: '#/components/schemas/UEAnchorInterest'
          minItems: 1
      required:
        - event

    UEAnchorInterest:
      description: >
        Represents the UE with Spatial Anchors interest.
      type: object
      properties:
        ueId:
          type: string
        anchrId:
          $ref: '#/components/schemas/SpatialAnchorId'
        anchrRng:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Float'
      anyOf:
        - required: [ueId]
        - required: [anchrId]
        - required: [anchrRng]

    AnchorsEventsSub:
      description: >
        Represents the Spatial Anchors subscription event and filters.
      type: object
      properties:
        event:
          $ref: '#/components/schemas/AnchorEvent'
        evntFltr:
          $ref: '#/components/schemas/EventFilter'
      required:
        - event
        - evntFltr

    EventFilter:
      description: >
        Represents the Spatial Anchors Event filters.
      type: object
      properties:
        discFltr:
          $ref: '#/components/schemas/DiscoveryFilter'
        ueFltr:
          $ref: '#/components/schemas/UeFilter'
        rngFltr:
          $ref: '#/components/schemas/RangeFilter'
        anchrFltr:
          $ref: '#/components/schemas/AnchorFilter'

    DiscoveryFilter:
      description: >
        Represents the Spatial Anchors discovery event filters.
      type: object
      properties:
        mgntEvts:
          type: array
          items:
            $ref: '#/components/schemas/AnchorManagementEvent'
          minItems: 1
      required:
        - mgntEvts

    UeFilter:
      description: >
        Represents the UE with spatial anchors event filters.
      type: object
      properties:
        rngVal:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Float'
        disc:
          type: boolean
          description: >
            Indicates whether the UEs that have discovered spatial anchors are to be
            included in the report. When present, it shall be set as follows:
            true: include UEs that discovered the spatial anchors.
            false: not include UEs that discovered the spatial anchors.
            Default value when omitted is "false".
      required:
        - rngVal

    RangeFilter:
      description: >
        Represents the Spatial Anchors in range event filters.
      type: object
      properties:
        perSrch:
          type: boolean
          description: >
            Contains the persistent search preference. When present, it shall be set as follows:
            true: enable persistent search.
            false: not enable persistent search.
            Default value when omitted is "false".
        usrLoc:
          $ref: 'TS29122_MonitoringEvent.yaml#/components/schemas/LocationInfo'
        pose:
          $ref: '#/components/schemas/Pose'
        appRng:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Float'
      required:
        - appRng

    AnchorFilter:
      description: >
        Represents the applicable spatial anchors filters.
      type: object
      properties:
        anchIds:
          type: array
          items:
            $ref: '#/components/schemas/SpatialAnchorId'
          minItems: 1
        svcIds:
          type: array
          items:
            type: string
          minItems: 1
        areaInt:
          $ref: 'TS29558_Eecs_EESRegistration.yaml#/components/schemas/ServiceArea'
      anyOf:
        - required: [anchIds]
        - required: [svcIds]
        - required: [areaInt]

    SpatialAnchorProfile:
      description: >
        Represents the spatial anchor profile.
      type: object
      properties:
        anchInfo:
          $ref: '#/components/schemas/SpatialAnchor'
        valSvcInf:
          $ref: '#/components/schemas/VALServiceInfo'
      required:
        - anchInfo
        - valSvcInf

    Pose:
      description: >
        Represents the Pose.
      type: object
      properties:
        orientation:
          $ref: '#/components/schemas/Orientation'
        position:
          $ref: 'TS29572_Nlmf_Location.yaml#/components/schemas/Local3dPointUncertaintyEllipsoid'
        fov:
          $ref: '#/components/schemas/Fov'
      required:
        - orientation

    Orientation:
      description: >
        Represents the Orientation.
      type: object
      properties:
        x:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Float'
        y:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Float'
        z:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Float'
        w:
          $ref: '#/components/schemas/Angle'
      required:
        - x
        - y
        - z
        - w

    Fov:
      description: >
        Represents the field of view.
      type: object
      properties:
        angleLeft:
          $ref: '#/components/schemas/Angle'
        angleRight:
          $ref: '#/components/schemas/Angle'
        angleUp:
          $ref: '#/components/schemas/Angle'
        angleDown:
          $ref: '#/components/schemas/Angle'
      required:
        - angleLeft
        - angleRight
        - angleUp
        - angleDown

# SIMPLE DATA TYPES
#

    SpatialAnchorId:
      $ref: 'TS29571_CommonData.yaml#/components/schemas/Uint32'
    Angle:
      description: Indicates value of angle.
      type: integer
      minimum: 0
      maximum: 360


          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

components:
  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "{tokenUrl}"
          scopes: {}

  schemas:
#
# STRUCTURED DATA TYPES
#
    SpatialAnchorsUsageInfoSub:
      description: >
        Represents the spatial anchors usage information subscription.
      type: object
      properties:
        eventSubs:
          type: array
          items:
            $ref: '#/components/schemas/AnchorsUsageSub'
          minItems: 1
        notifUri:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/Uri'
        report:
          $ref: '#/components/schemas/SpatialAnchorsUsageInfoNotif'
        sampInt:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DurationSec'
        reportReq:
          $ref: 'TS29523_Npcf_EventExposure.yaml#/components/schemas/ReportingInformation'
        expTime:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DateTime'
        suppFeat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - eventSubs

    SpatialAnchorsUsageInfoSubPatch:
      description: >
        Represents the spatial anchors usage information subscription.
      type: object
      properties:
        eventSubs:
          type: array
          items:
            $ref: '#/components/schemas/AnchorsUsageSub'
          minItems: 1
        notifUri:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/Uri'
        sampInt:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DurationSec'
        reportReq:
          $ref: 'TS29523_Npcf_EventExposure.yaml#/components/schemas/ReportingInformation'
        expTime:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/DateTime'

    AnchorsUsageSub:
      description: >
        Represent the subscription details related to spatial anchor usage.
      type: object
      properties:
        event:
          $ref: '#/components/schemas/AnchorUsageEvent'
        evntFltr:
          $ref: '#/components/schemas/AnchorsUsageEventFilter'
      required:
        - event
        - evntFltr

    AnchorsUsageEventFilter:
      description: >
        Represents the filter information for anchors usage event.
      type: object
      properties:
        anchAnlFltr:
          $ref: '#/components/schemas/AnchorsUsageFilter'

    AnchorsUsageFilter:
      description: >
        Represents the spatial anchors usage filter information.
      type: object
      properties:
        anchIds:
           type: array
           items:
             $ref: 'TS29437_SS_SAnManagement.yaml#/components/schemas/SpatialAnchorId'
           minItems: 1
        anchLoc:
          $ref: 'TS29122_MonitoringEvent.yaml#/components/schemas/LocationInfo'
        area:
          $ref: 'TS29558_Eecs_EESRegistration.yaml#/components/schemas/ServiceArea'
        appId:
          type: string
      anyOf:
        - required: [anchIds]
        - required: [anchLoc]
        - required: [area]
        - required: [appId]

    SpatialAnchorsUsageInfoNotif:
      description: >
        Represents the spatial anchors usage information notification.
      type: object
      properties:
        subId:
          type: string
        reports:
          type: array
          items:
            $ref: '#/components/schemas/SpatialAnchorsUsageReport'
          minItems: 1
      required:
        - subId
        - reports

    SpatialAnchorsUsageReport:
      description: >
        Represents the usage report in the notification.
      type: object
      properties:
        event:
          $ref: '#/components/schemas/AnchorUsageEvent'
        anchUsgInf:
          type: array
          items:
            $ref: '#/components/schemas/AnchorsUsageInfo'
          minItems: 1
      required:
        - event

    AnchorsUsageInfo:
      description: >
        Represents the anchor usage details.
      type: object
      properties:
        anchIds:
          type: array
          items:
            $ref: 'TS29437_SS_SAnManagement.yaml#/components/schemas/SpatialAnchorId'
          minItems: 1
        discAcc:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        serAcc:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        anchDensity:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        usrDensity:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
      required:
        - anchIds
        - discAcc
        - serAcc
        - anchDensity
        - usrDensity

    SpatialAnchorUsageReportReq:
      description: >
        Represents the request for spatial anchor usage report.
      type: object
      properties:
        anchUsg:
          type: array
          items:
            $ref: '#/components/schemas/AnchorUsage'
          minItems: 1
        suppFeat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - anchUsg

    AnchorUsage:
      description: >
        Represents the anchor usage information reported.
      type: object
      properties:
        anchId:
          $ref: 'TS29437_SS_SAnManagement.yaml#/components/schemas/SpatialAnchorId'
        access:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
        repPer:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/TimeWindow'
      required:
        - anchId
        - access

    SpatialAnchorsUsageInfo:
      description: >
        Represents the response to the spatial anchor usage information request.
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/SpatialAnchorsUsageReport'
          minItems: 0
        suppFeat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - reports

# SIMPLE DATA TYPES
#
#
# ENUMERATIONS
#
    AnchorUsageEvent:
      anyOf:
      - type: string
        enum:
        - SPATIAL_ANCHOR_USAGE_INFORMATION
      - type: string
        description: >
          This string provides forward-compatibility with future extensions to the enumeration but
          is not used to encode content defined in the present version of this API.
      description: |
        Represents the type of entity.  
        Possible values are:  
          - SPATIAL_ANCHOR_USAGE_INFORMATION: Indicates that the event is related to spatial
            anchors usage.
# Data types describing alternative data types or combinations of data types:
#

openapi: 3.0.0

info:
  title: Aimlec_AIMLEClientParticipation
  version: 1.0.2
  description: |
    API for Client Participation Service.  
    © 2026, 3GPP Organizational Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).  
    All rights reserved.

externalDocs:
  description: >
    3GPP TS 24.560 V19.1.0; Artificial Intelligence / Machine Learning (AIML) Services – Service
    Enabler Architecture Layer for Verticals (SEAL); Protocol Specification; Stage 3.
  url: 'https://www.3gpp.org/ftp/Specs/archive/24_series/24.560/'

servers:
  - url: '{apiRoot}/aimlec-cp/v1'
    variables:
      apiRoot:
        default: https://example.com
        description: apiRoot as defined in clause 5.2.4 of 3GPP TS 29.122.

security:
  - {}
  - oAuth2ClientCredentials: []

paths:
  /participation:
    post:
      summary: >
        Used by AIMLE server to manage the participation of AIMLE clients in AI/ML operations.
      operationId: ClientParticipation
      tags:
        - AIMLE client for participation of the AI/ML operations request (Collection)
      requestBody:
        description: Contains information of the AIMLE client participates the AI/ML operations.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AimlecParticipationReq'
      responses:
        '200':
          description: Contains the outcome of the successful AIMLE client participation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AimlecParticipationResp'
        '307':
          $ref: 'TS29122_CommonData.yaml#/components/responses/307'
        '308':
          $ref: 'TS29122_CommonData.yaml#/components/responses/308'
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '411':
          $ref: 'TS29122_CommonData.yaml#/components/responses/411'
        '413':
          $ref: 'TS29122_CommonData.yaml#/components/responses/413'
        '415':
          $ref: 'TS29122_CommonData.yaml#/components/responses/415'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

components:

  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: '{tokenUrl}'
          scopes: {}

  schemas:

# Structured data types

    AimlecParticipationReq:
      description: Represents the participation request for the AI/ML operations.
      type: object
      required:
      - requesterId
      - clientSetId
      - clientSetPart
      - mlModelId
      - schedAimlOperations
      - dataSetReq
      - serviceReq
      properties:
        requesterId:
          description: Represents the requester identity.
          type: string
        clientSetId:
          description: Represents the AIMLE client set identity.
          type: string
        clientSetPart:
          $ref: '#/components/schemas/ClientSetPart'
        mlModelId:
          description: Identifies the identity of the ML model for AI/ML operation.
          type: string
        schedAimlOperations:
          type: array
          items:
            $ref: '#/components/schemas/SchedAimlOperation'
          minItems: 1
        dataSetReq:
          $ref: 'TS29482_AIMLES_AIMLEClientDiscovery.yaml#/components/schemas/DatasetRequirement'
        serviceReq:
          $ref: 'TS29482_AIMLES_AIMLEClientDiscovery.yaml#/components/schemas/ServiceRequirement'

    AimlecParticipationResp:
      description: Represents the participation response for the AI/ML operations.
      type: object
      required:
      - clientStatus
      properties:
        clientStatus:
          description: true indicates the willingness and false indicates the denial.
          type: boolean

    SchedAimlOperation:
      description: Represents the scheduled AI/ML participation type.
      type: object
      required:
      - aimlOperation
      properties:
        aimlOperation:
          $ref: 'TS24560_Aimles_AIMLEClientRegistration.yaml#/components/schemas/AimlOperation'
        aimlOperSched:
          $ref: 'TS29122_CpProvisioning.yaml#/components/schemas/ScheduledCommunicationTime'

# Enumerations

    ClientSetPart:
      anyOf:
      - type: string
        enum:
          - JOIN
          - DEPART
      - type: string
        description: >
          This string provides the participation request for the AIMLE client set.
      description: |
        Identifies the type of request for participating the AIMLE client set.  
        Possible values are:
        - JOIN: Request to join the AIMLE client set.
        - DEPART: Request to depart from the AIMLE client set.

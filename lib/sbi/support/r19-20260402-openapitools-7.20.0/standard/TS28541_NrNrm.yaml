openapi: 3.0.1
info:
  title: NR NRM
  version: 19.6.0
  description: >-
    OAS 3.0.1 specification of the NR NRM
    © 2025, 3GPP Organizational Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).
    All rights reserved.
externalDocs:
  description: 3GPP TS 28.541; 5G NRM, NR NRM
  url: http://www.3gpp.org/ftp/Specs/archive/28_series/28.541/
paths: {}
components:
  schemas:

#-------- Definition of types-----------------------------------------------------

    GnbId:
      type: integer
      minimum: 0
      maximum: 4294967295
      format: int64
    GnbIdLength:
      type: integer
      minimum: 22
      maximum: 32
    GnbName:
      type: string
      maxLength: 150
    GnbDuId:
      type: integer
      minimum: 0
      maximum: 68719476735
      format: int64
    GnbCuUpId:
      type: integer
      minimum: 0
      maximum: 68719476735
      format: int64
      readOnly: true

    Sst:
      type: integer
      minimum: 0
      maximum: 255
    Snssai:
      type: object
      properties:
        sst:
          $ref: '#/components/schemas/Sst'
        sd:
          type: string
          pattern: '^[A-Fa-f0-9]{6}$'

    SatelliteId:
      type: string
      pattern: '^[0-9]{5}$'

    PlmnIdList:
      type: array
      uniqueItems: true
      items:
        $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
    PlmnInfo:
      type: object
      properties:
        plmnId:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
        snssai:
          $ref: '#/components/schemas/Snssai'
        sliceExpiryTime:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/DateTime'          
    PlmnInfoList:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/PlmnInfo'
      minItems: 1
    NPNIdentityList:
      type: array
      uniqueItems: true
      items:
        $ref: 'TS28623_GenericNrm.yaml#/components/schemas/NpnId-Type'
      minItems: 1
    GgNBId:
      type: object
      properties:
        plmnId:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
        gnbIdLength:
          $ref: '#/components/schemas/GnbIdLength'
        gnbId:
          $ref: '#/components/schemas/GnbId'
    GeNBId:
      type: object
      properties:
        plmnId:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
        enbId:
          type: integer
          minimum: 0
          maximum: 4194303

    GgNBIdList:
        type: array
        uniqueItems: true
        items: 
          $ref: '#/components/schemas/GgNBId'

    GeNBIdList:
        type: array
        uniqueItems: true
        items: 
          $ref: '#/components/schemas/GeNBId'

    NrPci:
      type: integer
      maximum: 503
    NRTAC:
      $ref: 'TS28623_GenericNrm.yaml#/components/schemas/Tac'
    NRTACList:
      type: array
      uniqueItems: true
      items:
        $ref: 'TS28623_GenericNrm.yaml#/components/schemas/Tac'
    TaiList:
      type: array
      uniqueItems: true
      items:
        $ref: 'TS28623_GenericNrm.yaml#/components/schemas/Tai'         
    BackhaulAddress:
      type: object
      properties:
        gnbId:
          $ref: '#/components/schemas/GnbId'
        tai:
          $ref: "TS28623_GenericNrm.yaml#/components/schemas/Tai"
    MappingSetIDBackhaulAddress:
      type: object
      properties:
        setId:
          type: integer
        backhaulAddress:
          $ref: '#/components/schemas/BackhaulAddress'
    LoadTimeThreshold:
      type: object
      properties:
        loadThreshold:
          type: integer
        timeDuration:
          type: integer
    IntraRatEsActivationOriginalCellLoadParameters:
      $ref: '#/components/schemas/LoadTimeThreshold'
    IntraRatEsActivationCandidateCellsLoadParameters:
      $ref: '#/components/schemas/LoadTimeThreshold'
    IntraRatEsDeactivationCandidateCellsLoadParameters:
      $ref: '#/components/schemas/LoadTimeThreshold'
    EsNotAllowedTimePeriod:
      type: object
      properties:
        startTime:
          type: string
          description: >-
            Time of day is in HH:MM or H:MM 24-hour format per UTC time zone.
            Examples, 20:15, 20:15-08:00 (for 8 hours behind UTC).
        endTime:
          type: string
          description: >-
            Time of day is in HH:MM or H:MM 24-hour format per UTC time zone.
            Examples, 20:15, 20:15-08:00 (for 8 hours behind UTC).
        daysOfWeek:
          type: string
          enum:
            - MONDAY
            - TUESDAY
            - WEDNESDAY
            - THURSDAY
            - FRIDAY
            - SATURDAY
            - SUNDAY
    InterRatEsActivationOriginalCellParameters:
      $ref: '#/components/schemas/LoadTimeThreshold'
    InterRatEsActivationCandidateCellParameters:
      $ref: '#/components/schemas/LoadTimeThreshold'
    InterRatEsDeactivationCandidateCellParameters:
      $ref: '#/components/schemas/LoadTimeThreshold'

    UeAccProbabilityDist:
      type: array
      items:
        $ref: '#/components/schemas/UeAccProbability'
    UeAccProbability:
      type: object
      properties:
        targetProbability:
          type: integer
          minimum: 0
          maximum: 100
        NumberOfPreamblesSent:
          type: integer
          minimum: 0
          maximum: 200


    UeAccDelayProbabilityDist:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/UeAccDelayProbability'

    UeAccDelayProbability:
      type: object
      properties:
        targetProbability:
          type: integer
          minimum: 0
          maximum: 100
        accessDelay:
          type: integer
          minimum: 10
          maximum: 560

    NRPciList:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/NrPci'
      minItems: 0
      maxItems: 1007

    CSonPciList:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/NrPci'
      minItems: 1
      maxItems: 100

    MaximumDeviationHoTrigger:
      type: integer
      minimum: -20
      maximum: 20

    MaximumDeviationHoTriggerLow:
      type: integer
      minimum: -20
      maximum: 20

    MaximumDeviationHoTriggerHigh:
      type: integer
      minimum: -20
      maximum: 20

    MinimumTimeBetweenHoTriggerChange:
      type: integer
      minimum: 0
      maximum: 604800

    TstoreUEcntxt:
      type: integer
      minimum: 0
      maximum: 1023

    CellState:
      type: string
      enum:
        - IDLE
        - INACTIVE
        - ACTIVE
      readOnly: true  
    CyclicPrefix:
      type: string
      enum:
        - NORMAL
        - EXTENDED
    TxDirection:
      type: string
      enum:
        - DL
        - UL
        - DL_AND_UL
    BwpContext:
      type: string
      enum:
        - DL
        - UL
        - SUL
    IsInitialBwp:
      type: string
      enum:
        - INITIAL
        - INITIAL_REDCAP
        - OTHER
    IsESCoveredBy:
      type: string
      enum:
        - NO
        - PARTIAL
        - FULL
    RRMPolicyMember:
      type: object
      properties:
        plmnId:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
        snssai:
          $ref: '#/components/schemas/Snssai'
    RRMPolicyMemberList:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/RRMPolicyMember'
      minItems: 1
    AddressWithVlan:
      type: object
      properties:
        iPAddress:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/IpAddr'
        vlanId:
          type: integer
          minimum: 0
          maximum: 4096
    LocalAddress:
      type: object
      properties:
        addressWithVlan:
          $ref: '#/components/schemas/AddressWithVlan'
        port:
          type: integer
          minimum: 0
          maximum: 65535
    RemoteAddress:
      $ref: 'TS28623_ComDefs.yaml#/components/schemas/IpAddr'
    QOffsetRange:
      type: integer
      default: 0
      enum:
        - -24
        - -22
        - -20
        - -18
        - -16
        - -14
        - -12
        - -10
        - -8
        - -6
        - -5
        - -4
        - -3
        - -2
        - -1
        - 0
        - 24
        - 22
        - 20
        - 18
        - 16
        - 14
        - 12
        - 10
        - 8
        - 6
        - 5
        - 4
        - 3
        - 2
        - 1
    QOffsetFreq:
      type: number
      default: 0      
    TReselectionNRSf:
      type: integer
      enum:
        - 25
        - 50
        - 75
        - 100
    SsbPeriodicity:
      type: integer
      enum:
        - 5
        - 10
        - 20
        - 40
        - 80
        - 160
    SsbDuration:
      type: integer
      enum:
        - 1
        - 2
        - 3
        - 4
        - 5
    SsbSubCarrierSpacing:
      type: integer
      enum:
        - 15
        - 30
        - 120
        - 240
    CoverageShape:
      type: integer
      maximum: 65535
    DigitalTilt:
      type: integer
      minimum: -900
      maximum: 900
    DigitalAzimuth:
      type: integer
      minimum: -1800
      maximum: 1800
    RSSetId:
      type: integer
      maximum: 4194303
    
    RSSetType:
      type: string
      enum:
        - RS1
        - RS2

    FrequencyDomainPara:
      type: object
      properties:
        rimRSSubcarrierSpacing:
          type: integer
        rIMRSBandwidth:
         type: integer
        nrofGlobalRIMRSFrequencyCandidates:
          type: integer
        rimRSCommonCarrierReferencePoint:
         type: integer
         minimum: 0
         maximum: 3279165

        rimRSStartingFrequencyOffsetIdList:
          type: array
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 550
          minItems: 1
          maxItems: 4
          description: > 
            It is a list of configured frequency offsets in units of resource blocks. 
            Only 1,2 or 4 number of elements allowed in the array.
    SequenceDomainPara:
      type: object
      properties:
        nrofRIMRSSequenceCandidatesofRS1:
         type: integer
        rimRSScrambleIdListofRS1:
          type: array
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 1023
          minItems: 1
          maxItems: 8
        nrofRIMRSSequenceCandidatesofRS2:
         type: integer
        rimRSScrambleIdListofRS2:
          type: array
          uniqueItems: true
          items:
            type: integer
            minimum: 0
            maximum: 1023
          minItems: 1
          maxItems: 8
        enableEnoughNotEnoughIndication:
          type: string
          enum:
            - ENABLE
            - DISABLE
          default: DISABLE                        
        rIMRSScrambleTimerMultiplier:
          type: integer
        rIMRSScrambleTimerOffset:
          type: integer

    TimeDomainPara:
      type: object
      properties:
        dlULSwitchingPeriod1:
          type: string
          enum:
           - MS0P5
           - MS0P625
           - MS1
           - MS1P25
           - MS2
           - MS2P5
           - MS3
           - MS4
           - MS5
           - MS10
           - MS20
        symbolOffsetOfReferencePoint1:
           type: integer
        dlULSwitchingPeriod2:
          type: string
          enum:
           - MS0P5
           - MS0P625
           - MS1
           - MS1P25
           - MS2
           - MS2P5
           - MS3
           - MS4
           - MS5
           - MS10
           - MS20
        symbolOffsetOfReferencePoint2:
          type: integer
        totalnrofSetIdofRS1:
          type: integer
        totalnrofSetIdofRS2:
          type: integer
        nrofConsecutiveRIMRS1:
          type: integer
        nrofConsecutiveRIMRS2:
          type: integer
        consecutiveRIMRS1List:
          type: array
          uniqueItems: true
          items:
            type: integer
        consecutiveRIMRS2List:
          type: array
          uniqueItems: true
          items:
            type: integer
        enablenearfarIndicationRS1:
          type: string
          enum:
            - ENABLE
            - DISABLE
          default: DISABLE                      
        enablenearfarIndicationRS2:
          type: string
          enum:
            - ENABLE
            - DISABLE
          default: DISABLE                      

    RimRSReportInfo:
      type: object
      properties:
        detectedSetID:
          type: integer
        propagationDelay:
          type: integer
        functionalityOfRIMRS:
          type: string
          enum:
            - RS1
            - RS2
            - RS1_FOR_ENOUGH_MITIGATION
            - RS1_FOR_NOT_ENOUGH_MITIGATION         

    RimRSReportConf:
      type: object
      properties:
        reportIndicator:
          type: string
          enum:
            - ENABLE
            - DISABLE
          default: DISABLE                      
        reportInterval:
           type: integer
        nrofRIMRSReportInfo:
          type: integer
        maxPropagationDelay:
          type: integer
        rimRSReportInfoList:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/RimRSReportInfo'
    TceIDMappingInfo:
      type: object
      properties:
        tceIPAddress:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/IpAddr'
        tceID:
          type: integer
        pLMNTarget:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
    TceIDMappingInfoList:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/TceIDMappingInfo'
      minItems: 1
    ResourceType:
      type: string
      enum:
        - PRB
        - PRB_UL
        - PRB_DL
        - RRC_CONNECTED_USERS
        - DRB    
    ParameterRange:
      type: object
      properties:
          maxValue:
            type: integer
          minValue:
            type: integer
    NTNTAClist:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/NRTAC'  
    Ephemeris:
      type: object
      oneOf:
        - required: [ positionVelocity ]
        - required: [ orbital ]
      required:
        - satelliteId
        - epochTime
      properties:
        satelliteId:
          $ref: '#/components/schemas/SatelliteId'
        epochTime:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/DateTime'
        positionVelocity:
          $ref: '#/components/schemas/PositionVelocity'
        orbital:
          $ref: '#/components/schemas/Orbital'

    EphemerisInfos:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/Ephemeris'
      minItems: 1

    PositionVelocity:
      type: object
      properties:
        positionX:
          type: integer
          default: 0
          minimum: 0
          maximum: 604800
        positionY:
          type: integer
          default: 0          
          minimum: 0
          maximum: 604800
        positionZ:
          type: integer
          default: 0          
          minimum: 0
          maximum: 604800
        velocityVX:
          type: integer
          default: 0          
          minimum: -131072
          maximum: 131071         
        velocityVY:
          type: integer
          default: 0          
          minimum: -131072
          maximum: 131071           
        velocityVZ:
          type: integer
          default: 0          
          minimum: -131072
          maximum: 131071

    Orbital:
      type: object
      properties:
          semiMajorAxis:
            type: integer
            default: 0            
            minimum: 0
            maximum: 8589934591 
            format: int64
          eccentricity:
            type: integer
            default: 0                 
            minimum: -524288
            maximum: 524287
          periapsis:
            type: integer
            default: 0     
            minimum: 0
            maximum: 16777215
          longitude:
            type: integer
            default: 0                 
            minimum: 0
            maximum: 2097151
          inclination:
            type: integer
            default: 0                 
            minimum: -524288
            maximum: 524287
          meanAnomaly:
            type: integer
            default: 0                 
            minimum: 0
            maximum: 16777215

    MappedCellIdInfo:
      type: object
      properties:
        ntnGeoArea:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/GeoArea'
        mappedCellId:
          $ref: 'TS28541_5GcNrm.yaml#/components/schemas/Ncgi'
    MappedCellIdInfoList:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/MappedCellIdInfo'
    QceIdMappingInfo:
      type: object
      properties:
        qoECollectionEntityAddress:
          oneOf:
            - $ref: 'TS28623_ComDefs.yaml#/components/schemas/Ipv4Addr'
            - $ref: 'TS28623_ComDefs.yaml#/components/schemas/Ipv6Addr'
        qoECollectionEntityIdentity:
          type: string
        pLMNTarget:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
    QceIdMappingInfoList:
      type: array
      uniqueItems: true
      items:
        $ref: '#/components/schemas/QceIdMappingInfo'
      minItems: 1
    MdtUserConsentReqList:
      type: array
      uniqueItems: true
      items:
        type: string
        enum:
          - M1
          - M2
          - M3
          - M4
          - M5
          - M6
          - M7
          - M8
          - M9
          - MDT_UE_LOCATION
    
    NTNEntityConf:
      type: object
      properties:
        nTNConfEntity:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/Dn'
        nTNConfList:
          type: array
          uniqueItems: true
          items:
            $ref: 'TS28623_ComDefs.yaml#/components/schemas/AttributeNameValuePairSet'
    LocationInfo:
      type: object
      properties:
        gNBId:
          type: integer
        pLMNId:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
        cellLocalId:
          type: integer
        nRTAC:
          type: string
        tAI:
          $ref: 'TS28623_GenericNrm.yaml#/components/schemas/Tai'
        geoArea:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/GeoArea'    
    ServedAIOTAreaID:
      type: object
      properties:
        pLMNId:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/PlmnId'
        nID:
          $ref: 'TS28541_5GcNrm.yaml#/components/schemas/Nid'
        aIotAreaCode:
          type: string
    MnrOamIPConfig:
      type: object
      properties:
        caraConfiguration:
          $ref: '#/components/schemas/CaraConfiguration'
        seGwConfiguration:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/HostAddr'
        scsConfiguration:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/HostAddr'
    CaraConfiguration:
      type: object
      properties:
        caraAddress:
          $ref: 'TS28623_ComDefs.yaml#/components/schemas/HostAddr'
        portNumber:
          type: integer
        path:
          type: string
        subjectName:
          type: string
        protocol:
          type: string
          enum:
            - HTTP
            - HTTPS
          default: HTTP

#-------- Definition of types for name-containments ------
    SubNetwork-ncO-NrNrm:
      type: object
      properties:
        NRFrequency:
          $ref: '#/components/schemas/NRFrequency-Multiple'
        ExternalGNBCUCPFunction:
          $ref: '#/components/schemas/GNBCUCPFunction-Multiple'
        ExternalGNBCUUPFunction:
          $ref: '#/components/schemas/ExternalGNBCUUPFunction-Multiple'
        ExternalGNBDUFunction:
          $ref: '#/components/schemas/ExternalGNBDUFunction-Multiple'
        ExternalENBFunction:
          $ref: '#/components/schemas/ExternalENBFunction-Multiple'
        EUtranFrequency:
          $ref: '#/components/schemas/EUtranFrequency-Multiple'
        DESManagementFunction:
          $ref: '#/components/schemas/DESManagementFunction-Single'
        DRACHOptimizationFunction:
          $ref: '#/components/schemas/DRACHOptimizationFunction-Single'
        DMROFunction:
          $ref: '#/components/schemas/DMROFunction-Single'
        DLBOFunction:
          $ref: '#/components/schemas/DLBOFunction-Single'
        DPCIConfigurationFunction:
          $ref: '#/components/schemas/DPCIConfigurationFunction-Single'
        CPCIConfigurationFunction:
          $ref: '#/components/schemas/CPCIConfigurationFunction-Single'
        CESManagementFunction:
          $ref: '#/components/schemas/CESManagementFunction-Single'
        RedCapAccessCriteria:
          $ref: '#/components/schemas/RedCapAccessCriteria-Single'
        Configurable5QISet:
          $ref: 'TS28541_5GcNrm.yaml#/components/schemas/Configurable5QISet-Multiple'
        RimRSGlobal:
          $ref: '#/components/schemas/RimRSGlobal-Single'
        Dynamic5QISet:
          $ref: 'TS28541_5GcNrm.yaml#/components/schemas/Dynamic5QISet-Multiple'
        CCOFunction:
          $ref: '#/components/schemas/CCOFunction-Single'
        NTNFunction:
          $ref: '#/components/schemas/NTNFunction-Single'
        NRECMappingRule:
          $ref: '#/components/schemas/NRECMappingRule-Multiple'
        MWAB:
          $ref: '#/components/schemas/MWAB-Multiple'
        IAB:
          $ref: '#/components/schemas/IAB-Multiple'

    ManagedElement-ncO-NrNrm:
      type: object
      properties:
        GNBDUFunction:
          $ref: '#/components/schemas/GNBDUFunction-Multiple'
        GNBCUUPFunction:
          $ref: '#/components/schemas/GNBCUUPFunction-Multiple'
        GNBCUCPFunction:
          $ref: '#/components/schemas/GNBCUCPFunction-Multiple'
        DESManagementFunction:
          $ref: '#/components/schemas/DESManagementFunction-Single'
        DRACHOptimizationFunction:
          $ref: '#/components/schemas/DRACHOptimizationFunction-Single'
        DMROFunction:
          $ref: '#/components/schemas/DMROFunction-Single'
        DLBOFunction:
          $ref: '#/components/schemas/DLBOFunction-Single'
        DPCIConfigurationFunction:
          $ref: '#/components/schemas/DPCIConfigurationFunction-Single'
        CPCIConfigurationFunction:
          $ref: '#/components/schemas/CPCIConfigurationFunction-Single'
        CESManagementFunction:
          $ref: '#/components/schemas/CESManagementFunction-Single'
        Configurable5QISet:
          $ref: 'TS28541_5GcNrm.yaml#/components/schemas/Configurable5QISet-Multiple'
        Dynamic5QISet:
          $ref: 'TS28541_5GcNrm.yaml#/components/schemas/Dynamic5QISet-Multiple'
        NTNFunction:
          $ref: '#/components/schemas/NTNFunction-Single'
        NRECMappingRule:
          $ref: '#/components/schemas/NRECMappingRule-Multiple'
        MWAB:
          $ref: '#/components/schemas/MWAB-Multiple'
        IAB:
          $ref: '#/components/schemas/IAB-Multiple'

#-------- Definition of abstract IOCs --------------------------------------------

    RRMPolicy_-Attr:
      type: object
      properties:
        resourceType:
          $ref: '#/components/schemas/ResourceType'        
        RRMPolicyMemberList:
          $ref: '#/components/schemas/RRMPolicyMemberList'

#-------- Definition of concrete IOCs --------------------------------------------

    GNBDUFunction-Single:
      allOf:
        - $ref: 'TS28623_GenericNrm.yaml#/components/schemas/Top'
        - type: object
          properties:
            attributes:
              allOf:
                - $ref: 'TS28623_GenericNrm.yaml#/components/schemas/ManagedFunction-Attr'
                - type: object
                  properties:
                    gnbDuId:
                      $ref: '#/components/schemas/GnbDuId'
                    gnbDuName:
                      $ref: '#/components/schemas/GnbName'
                    gnbId:
                      $ref: '#/components/schemas/GnbId'
                    gnbIdLength:
                      $ref: '#/components/schemas/GnbIdLength'
                    isOnboardSatellite:
                      type: boolean
                    onboardSatelliteId:
                      $ref: '#/components/schemas/SatelliteId'
                    rimRSReportConf:
                      $ref: '#/components/schemas/RimRSReportConf'
                    configurable5QISetRef:
                      $ref: 'TS28623_ComDefs.yaml#/components/schemas/Dn'
                    dynamic5QISetRef:
                      $ref: 'TS28623_ComDefs.yaml#/components/schemas/DnRo'
                    iABRef:
                      $ref: 'TS28623_ComDefs.yaml#/components/schemas/Dn'
        - $ref: 'TS28623_GenericNrm.yaml#/components/schemas/ManagedFunction-ncO'
        - type: object
          properties:
            RRMPolicyRatio:
              $ref: '#/components/schemas/RRMPolicyRatio-Multiple'
            NRCellDU:

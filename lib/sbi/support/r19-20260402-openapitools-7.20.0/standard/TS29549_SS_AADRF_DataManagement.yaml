           - SERVER_TO_SERVER_PERFORMANCE
      - type: string
        description: >
          This string provides forward-compatibility with future extensions to the enumeration and
          is not used to encode content defined in the present version of this API.
      description: |
        Indicates the subscribed events.  
        Possible values are:
        - VAL_SERVER_PERF: Indicates that requested analytics is VAL server performance analytics.
        - VAL_SESSION_PERF: Indicates that requested analytics is VAL session performance analytics.
        - SLICE_PERFORMANCE_ANALYTICS: Indicates that requested analytics is slice performance analytics.
        - UE_TO_UE_PERFORMANCE_ANALYTICS: Indicates that requested analytics is UE-to-UE performance analytics.
        - LOCATION_ACCURACY_PREDICTION: Indicates that the requested analytics is location accuracy prediction.
        - LOCATION_ACCURACY_SUSTAINABILITY: Indicates that the requested analytics is location accuracy sustainability.
        - SERVICE_API_ANALYTICS: Indicates that the requested analytics is service API analytics.
        - SLICE_USAGE_PATTERN_ANALYTICS: Indicated that the requested analytics is slice usage pattern analytics.
        - EDGE_LOAD_ANALYTICS: Indicated that the requested analytics is edge load analytics.
        - GROUP_ROUTE: Indicates that the requested analytics is UE group route analytics.
        - GROUP_MEMBER_DEVIATION: Indicates that the requested analytics is UE group member deviation analytics.
        - TARGET_WITH_OTHER_UES: Indicates that the requested analytics is collision detection between the sets of target and other VAL UEs within a location.
        - ANY_UES_IN_LOC: Indicates that the requested analytics is collision detection between any VAL UEs within given location.
        - APP_MEMBER_CAPABILITY_ANALYTICS: Indicates that the identifier of the Application layer AIML member capability analytics event.
        - UE_RAT_CONNECTIVITY_ANALYTICS: Indicates that the requested analytics is UE RAT connectivity analytics event.
        - SERVER_TO_SERVER_PERFORMANCE: Indicates that the requested analytics is Server-to-Server Performance Analytics.


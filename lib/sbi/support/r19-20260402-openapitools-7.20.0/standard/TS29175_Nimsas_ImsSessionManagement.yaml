openapi: 3.0.0

info:
  title: 'IMS AS ImsSessionManagement Service'
  version: 1.0.1
  description: |
    Nimsas_ImsSessionManagement Service.  
    © 2026, 3GPP Organizational Partners (ARIB, ATIS, CCSA, ETSI, TSDSI, TTA, TTC).  
    All rights reserved.

externalDocs:
  description: >
    3GPP TS 29.175 V19.5.0; IP Multimedia Subsystem; IP Multimedia Subsystem (IMS) Application
    Server (AS) Services; Stage 3
  url: 'https://www.3gpp.org/ftp/Specs/archive/29_series/29.175'

servers:
  - url: '{apiRoot}/nimsas-ism/v1'
    variables:
      apiRoot:
        default: https://example.com
        description: apiRoot as defined in clause 4.4 of 3GPP TS 29.501

security:
  - {}
  - oAuth2ClientCredentials:
      - nimsas-ism

paths:
  /ims-sessions:
    post:
      summary: Create IMS Session
      operationId: ImsSessionCreate
      tags:
        - IMS Sessions (Collection)
      requestBody:
        description: Creates a new Individual IMS Session resource.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImsSessionInfo'
      responses:
        '201':
          description: >
            The creation of an Individual IMS Session resource is confirmed and
            a representation of that resource is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImsSessionInfo'
          headers:
            Location:
              description: > 
                The URI of the newly created resource, according to the structure:
                {apiRoot}/nimsas-ism/<apiVersion>/ims-sessions/{sessionId}.
              schema:
                type: string
        '307':
          description: Temporary Redirect
          content:
            application/json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect target IMS AS.
              schema:
                type: string
        '308':
          description: Permanent Redirect
          content:
            application/json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect target IMS AS.
              schema:
                type: string
        '400':
          $ref: 'TS29571_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29571_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29571_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29571_CommonData.yaml#/components/responses/404'
        '406':
          $ref: 'TS29571_CommonData.yaml#/components/responses/406'
        '411':
          $ref: 'TS29571_CommonData.yaml#/components/responses/411'
        '413':
          $ref: 'TS29571_CommonData.yaml#/components/responses/413'
        '415':
          $ref: 'TS29571_CommonData.yaml#/components/responses/415'
        '429':
          $ref: 'TS29571_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29571_CommonData.yaml#/components/responses/500'
        '501':
          $ref: 'TS29571_CommonData.yaml#/components/responses/501'
        '503':
          $ref: 'TS29571_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29571_CommonData.yaml#/components/responses/default'

  /ims-sessions/{sessionId}:
    patch:
      summary: modify the IMS session
      operationId: ImsSessionModify
      tags:
        - IMS Session Modification
      parameters:
        - name: sessionId
          in: path
          description: Identifies an individual IMS session.
          required: true
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/SessionId'
        - name: supported-features
          in: query
          description: Features required to be supported by the target NF
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      requestBody:
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/PatchItem'
              minItems: 1
        required: true
      responses:
        '200':
          description: Successful update on the IMS session.
          content:
            application/json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/PatchResult'
        '204':
          description: >
            No content, IMS AS accepts the request change which is to 
            delete the existing media.
        '307':
          description: Temporary Redirect
          content:
            application/json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect target IMS AS.
              schema:
                type: string
        '308':
          description: Permanent Redirect
          content:
            application/json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect target IMS AS.
              schema:
                type: string
        '400':
          $ref: 'TS29571_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29571_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29571_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29571_CommonData.yaml#/components/responses/404'
        '409':
          $ref: 'TS29571_CommonData.yaml#/components/responses/409'
        '411':
          $ref: 'TS29571_CommonData.yaml#/components/responses/411'
        '413':
          $ref: 'TS29571_CommonData.yaml#/components/responses/413'
        '415':
          $ref: 'TS29571_CommonData.yaml#/components/responses/415'
        '422':
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/ProblemDetails'
        '429':
          $ref: 'TS29571_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29571_CommonData.yaml#/components/responses/500'
        '502':
          $ref: 'TS29571_CommonData.yaml#/components/responses/502'
        '503':
          $ref: 'TS29571_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29571_CommonData.yaml#/components/responses/default'
    put:
      summary: Update an existing Individual IMS Session resource.
      operationId: ImsSessionUpdate
      tags:
        - Individual IMS Session (Document)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImsSessionInfo'
      responses:
        '200':
          description: >
            OK. The Individual IMS Session resource is successfully updated and a representation
            of the updated resource is returned in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImsSessionInfo'
        '204':
          description: >
            No Content. The Individual IMS Session Management resource is
            successfully updated and no content is returned in the response body.
        '307':
          $ref: 'TS29122_CommonData.yaml#/components/responses/307'
        '308':
          $ref: 'TS29122_CommonData.yaml#/components/responses/308'
        '400':
          $ref: 'TS29122_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29122_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29122_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29122_CommonData.yaml#/components/responses/404'
        '409':
          $ref: 'TS29122_CommonData.yaml#/components/responses/409'
        '411':
          $ref: 'TS29122_CommonData.yaml#/components/responses/411'
        '413':
          $ref: 'TS29122_CommonData.yaml#/components/responses/413'
        '415':
          $ref: 'TS29122_CommonData.yaml#/components/responses/415'
        '429':
          $ref: 'TS29122_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29122_CommonData.yaml#/components/responses/500'
        '503':
          $ref: 'TS29122_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29122_CommonData.yaml#/components/responses/default'

    delete:
      summary: delete the IMS session
      operationId: ImsSessionDelete
      tags:
        - IMS Session Deletion
      parameters:
        - name: sessionId
          in: path
          description: Identifies an individual IMS session.
          required: true
          schema:
            $ref: 'TS29571_CommonData.yaml#/components/schemas/SessionId'
      responses:
        '204':
          description: No content, successful delete of the resource identified by sessionId.
        '307':
          description: Temporary Redirect
          content:
            application/json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect target IMS AS.
              schema:
                type: string
        '308':
          description: Permanent Redirect
          content:
            application/json:
              schema:
                $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
          headers:
            Location:
              description: The URI pointing to the resource located on the redirect target IMS AS.
              schema:
                type: string
        '400':
          $ref: 'TS29571_CommonData.yaml#/components/responses/400'
        '401':
          $ref: 'TS29571_CommonData.yaml#/components/responses/401'
        '403':
          $ref: 'TS29571_CommonData.yaml#/components/responses/403'
        '404':
          $ref: 'TS29571_CommonData.yaml#/components/responses/404'
        '429':
          $ref: 'TS29571_CommonData.yaml#/components/responses/429'
        '500':
          $ref: 'TS29571_CommonData.yaml#/components/responses/500'
        '502':
          $ref: 'TS29571_CommonData.yaml#/components/responses/502'
        '503':
          $ref: 'TS29571_CommonData.yaml#/components/responses/503'
        default:
          $ref: 'TS29571_CommonData.yaml#/components/responses/default'

  /ims-sessions/event-subscriptions:
    post:
    # This is a pseudo operation, NF service consumers shall NOT invoke this method!
      summary: Nimsas_ImsSessionManagement Subscribe service operation, pseudo operation
      tags:
        - IMS Session Event Subscriptions (Collection)
      operationId: Subscribe
      requestBody:
        required: true
        content:
          application/json:
            # Unspecified schema for the JSON body, since this is not used by consumer or producer.
            schema: {}
      responses:
        default:
          $ref: 'TS29571_CommonData.yaml#/components/responses/default'

      callbacks:
        eventNotification:
          '{$request.body#/notifUri}':
          # The notification URI of the Service Consumer to receive the IMS session events.
            post:
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/ImsSessionEventNotification'
              responses:
                '204':
                  description: No Content, notification was succesfull.
                '307':
                  description: Temporary Redirect
                  content:
                    application/json:
                      schema:
                        $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
                  headers:
                    Location:
                      description: >
                        The URI pointing to the resource located on the redirect target NF
                        service consumer.
                      required: true
                      schema:
                        type: string
                '308':
                  description: Permanent Redirect
                  content:
                    application/json:
                      schema:
                        $ref: 'TS29571_CommonData.yaml#/components/schemas/RedirectResponse'
                  headers:
                    Location:
                      description: >
                        The URI pointing to the resource located on the redirect target NF
                        service consumer.
                      required: true
                      schema:
                        type: string
                '400':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/400'
                '401':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/401'
                '403':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/403'
                '404':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/404'
                '411':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/411'
                '413':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/413'
                '415':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/415'
                '429':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/429'
                '500':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/500'
                '502':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/502'
                '503':
                  $ref: 'TS29571_CommonData.yaml#/components/responses/503'
                default:
                  $ref: 'TS29571_CommonData.yaml#/components/responses/default'

components:

  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: '{nrfApiRoot}/oauth2/token'
          scopes:
            nimsas-ism: Access to the Nimsas_ImsSessionManagement API.

  schemas:

# STRUCTURED DATA TYPES

    ImsSessionInfo:
      description: The IMS session information and the media list used in the IMS session.
      type: object
      required:
        - sessionInfo
        - mediaInfoSet
      properties:
        sessionInfo:
          $ref: '#/components/schemas/SessionInfoSM'
        mediaInfoSet:
          description: Includes a list of media related information.
          type: array
          items:
            $ref: '#/components/schemas/MediaInfoExternal'
          minItems: 1
        sessionId:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SessionId'
        notifUri:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
        notifCorrelationId:
          type: string

    SessionInfoSM:
      description: The session information to be used.
      type: object
      required:
        - callingId
        - calledId
      properties:
        callingId:
          $ref: 'TS29562_Nhss_imsSDM.yaml#/components/schemas/ImsPublicId'
        calledId:
          $ref: 'TS29562_Nhss_imsSDM.yaml#/components/schemas/ImsPublicId'

    MediaInfoExternal:
      description: The media information used in the external created or updated IMS session.
      type: object
      required:
        - mediaType
        - mediaCorrectionId
      properties:
        mediaType:
          $ref: 'TS29175_Nimsas_SessionEventControl.yaml#/components/schemas/MediaType'
        mediaCorrectionId:
          type: string
        dcMediaParas:
          description: The information of the created data channel media.
          type: array
          items:
            $ref: '#/components/schemas/DcMediaPara'
          minItems: 1

    DcMediaPara:
      description: The parameters of the IMS DC media.
      type: object
      required:
        - dcType
      properties:
        dcType:
          $ref: '#/components/schemas/DcType'
        adcType:
          $ref: '#/components/schemas/AdcType'
        appBindingInfo:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/AppBindingInfo'
        targetIds:
          description: Representes the public identity(ies) of the IMS Subscriber the DC is targeted.
          type: array
          items:
            $ref: '#/components/schemas/TargetIdInfo'
          minItems: 1
        targetId:
          $ref: 'TS29562_Nhss_imsSDM.yaml#/components/schemas/ImsPublicId'
        mdc2EndpointInfo:
          $ref: 'TS29175_Nimsas_MediaControl.yaml#/components/schemas/Mdc2EndpointInfo'
        
    ImsSessionEventNotification:
      description: The IMS Session event notification.
      type: object
      required:
        - sessionId
        - eventType
        - notifCorrelationId
      properties:
        sessionId:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SessionId'
        eventType:
          $ref: '#/components/schemas/ImsSessionEventType'
        notifCorrelationId:
          type: string
        mediaInfoSet:
          description: Includes a list of media related information.
          type: array
          items:
            $ref: '#/components/schemas/MediaInfoExternal'
          minItems: 1
        callingIdentity:
          $ref: 'TS29562_Nhss_imsSDM.yaml#/components/schemas/ImsPublicId'
        calledIdentity:
          $ref: 'TS29562_Nhss_imsSDM.yaml#/components/schemas/ImsPublicId'
        failureReason:
          type: string



    TargetIdInfo:
      description: The public identity(ies) of the IMS Subscriber the DC is targeted.
      type: object
      properties:
        callingIdentity:
          $ref: 'TS29562_Nhss_imsSDM.yaml#/components/schemas/ImsPublicId'
        calledIdentity:
          $ref: 'TS29562_Nhss_imsSDM.yaml#/components/schemas/ImsPublicId'



# ENUMS

    DcType:
      description: The type of data channel.
      anyOf:
        - type: string
          enum:
            - BDC
            - ADC
        - type: string
          description: >
            This string provides forward-compatibility with future extensions to the enumeration
            and is not used to encode content defined in the present version of this API.

    AdcType:
      description: The type of the application data channel.
      anyOf:
        - type: string
          enum:
            - P2P
            - P2A
            - P2A2P
        - type: string
          description: >
            This string provides forward-compatibility with future extensions to the enumeration
            and is not used to encode content defined in the present version of this API.

    ImsSessionEventType:
      description: The IMS session event type for which the notification is generated.
      anyOf:
        - type: string
          enum:
            - SESSION_ESTABLISHMENT_SUCCESS
            - SESSION_ESTABLISHMENT_FAILURE
            - MEDIA_CHANGE_SUCCESS
            - MEDIA_CHANGE_FAILURE
            - SESSION_TERMINATION
        - type: string
          description: >
            This string provides forward-compatibility with future extensions to the enumeration
            and is not used to encode content defined in the present version of this API.

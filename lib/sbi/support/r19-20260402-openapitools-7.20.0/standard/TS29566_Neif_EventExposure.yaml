components:
  securitySchemes:
    oAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: '{nrfApiRoot}/oauth2/token'
          scopes:
            neif-ee: >
              Enables to access all the resources and custom operations of the Neif_EventExposure
              API.

  schemas:

#
# STRUCTURED DATA TYPES
#

    EnergyEeSubsc:
      description: >
        Represents the Energy Event Exposure Subscription.
      type: object
      properties:
        notifUri:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
        eventsSubscSets:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/EnergyEeSubscSet'
          minProperties: 1
          description: >
            Contains the set(s) of Energy Event Exposure subscription related details.
            The key of the map shall be set to the value of the "subscSetId" attribute of the
            corresponding map value encoded using the EnergyEeSubscSet data structure.
        suppFeat:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/SupportedFeatures'
      required:
        - notifUri
        - eventsSubscSets

    EnergyEeSubscPatch:
      description: >
        Represents the requested modifications to an Energy Event Exposure Subscription.
      type: object
      properties:
        notifUri:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uri'
        eventsSubscSets:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/EnergyEeSubscSet'
          minProperties: 1
          description: >
            Contains the set(s) of Energy Event Exposure subscription related details.
            The key of the map shall be set to the value of the "subscSetId" attribute of the
            corresponding map value encoded using the EnergyEeSubscSet data structure.

    EnergyEeNotif:
      description: >
        Represents the Energy Event Exposure Notification.
      type: object
      properties:
        subId:
          type: string
        reports:
          type: array
          items:
            $ref: '#/components/schemas/EnergyEeReport'
          minItems: 1
      required:
        - subId
        - reports

    EnergyEeSubscSet:
      description: >
        Represents the Energy Event Exposure Subscription set.
      type: object
      properties:
        event:
          $ref: '#/components/schemas/EnergyEeEvent'
        subscSetId:
          type: string
        supi:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Supi'
        gpsi:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Gpsi'
        dnn:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Dnn'
        snssai:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Snssai'
        appId:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/ApplicationId'
        flowDescs:
          type: array
          items:
            $ref: 'TS29514_Npcf_PolicyAuthorization.yaml#/components/schemas/FlowDescription'
          minItems: 1
        repPeriod:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/DurationSec'
        repTimeWin:
          $ref: 'TS29122_CommonData.yaml#/components/schemas/TimeWindow'
        enrgRepThres:
          $ref: 'TS29122_MonitoringEvent.yaml#/components/schemas/EnergyInfo'
        repPeriodThres:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/DurationSec'
        maxReportNbr:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/Uinteger'
      required:
        - event
        - subscSetId
      oneOf:
        - required: [supi]
        - required: [gpsi]
      not:
        required: [appId, flowDescs]

    EnergyEeReport:
      description: >
        Represents the Energy Event Exposure report.
      type: object
      properties:
        event:
          $ref: '#/components/schemas/EnergyEeEvent'
        subscSetId:
          type: string
        timeStamp:
          $ref: 'TS29571_CommonData.yaml#/components/schemas/DateTime'
        energyInfo:
          $ref: 'TS29122_MonitoringEvent.yaml#/components/schemas/EnergyInfo'
      required:
        - event
        - subscSetId
        - timeStamp


# SIMPLE DATA TYPES
#

#
# ENUMERATIONS
#

    EnergyEeEvent:
      anyOf:
        - type: string
          enum:
          - UE_ENERGY
          - PDU_SESSION_ENERGY
          - SERVICE_FLOW_ENERGY
          - UE_SNSSAI_ENERGY
        - type: string
          description: >
            This string provides forward-compatibility with future extensions to the enumeration
            and is not used to encode content defined in the present version of this API.
      description: |
        Represents the Energy Exposure event.  
        Possible values are:
        - UE_ENERGY: Indicates that the Energy Exposure event is the energy consumed by a UE.
        - PDU_SESSION_ENERGY: Indicates that the Energy Exposure event is the energy consumed
          by a PDU session of a UE.
        - SERVICE_FLOW_ENERGY: Indicates that the Energy Exposure event is the energy consumed
          by an application or service data flow of an application traffic of a UE.
        - UE_SNSSAI_ENERGY: Indicates that the Energy Exposure event is the energy consumed by
          a UE in an S-NSSAI.


# Data types describing alternative data types or combinations of data types:
#
